<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.box{
  background:#111827;
  padding:25px;
  border-radius:12px;
  width:320px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:8px;
  background:#0f172a;
  color:white;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

  <h2>Login 🔐</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

</div>

<script>

/* INIT ADMIN FIRST TIME */
if(!localStorage.getItem("users_init")){
  let users = [
    {user:"admin", pass:"admin123", role:"admin"}
  ];
  localStorage.setItem("users", JSON.stringify(users));
  localStorage.setItem("users_init","true");
}

/* GET USERS */
function getUsers(){
  return JSON.parse(localStorage.getItem("users")) || [];
}

/* LOGIN */
function login(){

  let user = document.getElementById("user").value.trim();
  let pass = document.getElementById("pass").value.trim();

  if(!user || !pass){
    alert("fill all");
    return;
  }

  let users = getUsers();

  let found = users.find(u => u.user === user && u.pass === pass);

  if(!found){
    alert("wrong login");
    return;
  }

  localStorage.setItem("auth","true");
  localStorage.setItem("user", user);
  localStorage.setItem("role", found.role);

  if(found.role === "admin"){
    location.href="admin.html";
  } else {
    location.href="dashboard.html";
  }
}

</script>

</body>
</html>
