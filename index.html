<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.box{
  background:#111827;
  padding:25px;
  border-radius:12px;
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:8px;
  background:#0f172a;
  color:white;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  cursor:pointer;
  margin-top:8px;
}

.switch{
  text-align:center;
  margin-top:10px;
  font-size:12px;
  opacity:0.7;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

  <h2 id="title">Login 🔐</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="action()">Continue</button>

  <div class="switch" onclick="toggle()">
    Switch to Register
  </div>

</div>

<script>

let mode = "login";

/* TOGGLE */
function toggle(){
  mode = mode === "login" ? "register" : "login";
  document.getElementById("title").innerText =
    mode === "login" ? "Login 🔐" : "Register 🆕";
}

/* GET USERS */
function getUsers(){
  return JSON.parse(localStorage.getItem("users")) || [];
}

/* SAVE USERS */
function saveUsers(data){
  localStorage.setItem("users", JSON.stringify(data));
}

/* MAIN ACTION */
function action(){

  let user = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;

  if(!user || !pass) return alert("fill all");

  let users = getUsers();

  /* REGISTER */
  if(mode === "register"){

    let exists = users.find(u => u.user === user);

    if(exists) return alert("User already exists");

    users.push({user, pass});
    saveUsers(users);

    alert("Account created!");
    toggle();
    return;
  }

  /* LOGIN */
  let found = users.find(u => u.user === user && u.pass === pass);

  if(!found) return alert("Wrong credentials");

  localStorage.setItem("auth","true");
  localStorage.setItem("user",user);

  window.location.href = "dashboard.html";
}

</script>

</body>
</html>
