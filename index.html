<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Projects Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 220px;
  height: 100vh;
  background: #111827;
  padding: 20px;
}

.sidebar h2 {
  font-size: 18px;
  margin-bottom: 20px;
}

.sidebar a {
  display: block;
  color: #94a3b8;
  text-decoration: none;
  margin: 10px 0;
}

.sidebar a:hover {
  color: white;
}

/* Main */
.main {
  flex: 1;
  padding: 20px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.search {
  padding: 8px;
  width: 200px;
  border-radius: 8px;
  border: none;
}

/* Grid */
.grid {
  margin-top: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
}

/* Card */
.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  background: #273449;
}

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 6px 10px;
  background: #38bdf8;
  color: black;
  border-radius: 6px;
  text-decoration: none;
  font-size: 13px;
}

</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>🚀 Dashboard</h2>
  <a href="#">Home</a>
  <a href="#">Projects</a>
  <a href="#">Settings</a>
</div>

<!-- Main -->
<div class="main">

  <div class="topbar">
    <h1>My Projects</h1>
    <input class="search" placeholder="Search...">
  </div>

  <div class="grid">

    <div class="card">
      <h3>Project 1</h3>
      <p>Modern web app</p>
      <a class="btn" href="#">Live</a>
      <a class="btn" href="#">Code</a>
    </div>

    <div class="card">
      <h3>Project 2</h3>
      <p>Dashboard UI</p>
      <a class="btn" href="#">Live</a>
      <a class="btn" href="#">Code</a>
    </div>

  </div>

</div>

</body>
</html>
