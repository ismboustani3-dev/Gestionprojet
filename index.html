<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.box{
  background:#1e293b;
  padding:30px;
  border-radius:12px;
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:8px;
  background:#111827;
  color:white;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>Login 🔐</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script>
function login(){
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  if(user && pass){
    localStorage.setItem("user", user);
    window.location.href = "dashboard.html";
  } else {
    alert("Fill fields ❌");
  }
}
</script>

</body>
</html>
