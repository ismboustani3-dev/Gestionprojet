<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Projects</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
  }

  h1 {
    padding: 20px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
  }

  .card {
    background: #1e293b;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
  }

  .card:hover {
    transform: translateY(-10px) scale(1.02);
  }

  .card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
  }

  .content {
    padding: 15px;
  }

  .btns a {
    display: inline-block;
    margin-right: 10px;
    margin-top: 10px;
    padding: 6px 12px;
    border-radius: 8px;
    background: #38bdf8;
    color: black;
    text-decoration: none;
    font-size: 14px;
  }

</style>
</head>

<body>

<h1>🚀 My Projects</h1>

<div class="grid">

  <div class="card">
    <img src="https://via.placeholder.com/400x200" />
    <div class="content">
      <h3>Project 1</h3>
      <p>Description dyal projet</p>
      <div class="btns">
        <a href="#">Live</a>
        <a href="#">Code</a>
      </div>
    </div>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/400x200" />
    <div class="content">
      <h3>Project 2</h3>
      <p>Description</p>
      <div class="btns">
        <a href="#">Live</a>
        <a href="#">Code</a>
      </div>
    </div>
  </div>

</div>

</body>
</html>
