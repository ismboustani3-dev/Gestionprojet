<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:white;
  padding:20px;
}
</style>
</head>

<body>

<h2>📊 Dashboard</h2>

<p>Welcome 👤 <span id="u"></span></p>

<button onclick="logout()">Logout</button>

<script>

/* BLOCK ADMIN */
if(localStorage.getItem("role") === "admin"){
  location.href="admin.html";
}

/* AUTH CHECK */
if(localStorage.getItem("auth") !== "true"){
  location.href="index.html";
}

document.getElementById("u").innerText =
localStorage.getItem("user");

/* LOGOUT */
function logout(){
  localStorage.clear();
  location.href="index.html";
}

</script>

</body>
</html>
