<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#111827;
}

.logout{
  background:#ef4444;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

/* CONTAINER */
.container{
  padding:20px;
}

/* FORM */
input{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#111827;
  color:white;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  cursor:pointer;
}

/* TABLE */
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
  background:#111827;
  border-radius:10px;
  overflow:hidden;
}

th, td{
  padding:12px;
  border-bottom:1px solid #2d3748;
  text-align:left;
}

th{
  background:#1e293b;
  color:#38bdf8;
}

/* ACTIONS */
.edit{
  background:#22c55e;
  color:white;
  border:none;
  padding:5px 8px;
  border-radius:6px;
  cursor:pointer;
}

.del{
  background:#ef4444;
  color:white;
  border:none;
  padding:5px 8px;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<script>
let user = localStorage.getItem("user");

if(!user){
  window.location.href="index.html";
}
</script>

<!-- TOP BAR -->
<div class="topbar">
  <h3>📊 Dashboard</h3>

  <div>
    👤 <span id="username"></span>
    <button class="logout" onclick="logout()">Logout</button>
  </div>
</div>

<!-- CONTENT -->
<div class="container">

<h3>➕ Add Project</h3>

<input id="user" placeholder="Username">
<input id="name" placeholder="Project name">
<input id="link" placeholder="Project link">
<button onclick="add()">Add</button>

<!-- TABLE -->
<table>
  <thead>
    <tr>
      <th>Username</th>
      <th>Project</th>
      <th>Link</th>
      <th>Actions</th>
    </tr>
  </thead>

  <tbody id="table"></tbody>
</table>

</div>

<script>

document.getElementById("username").innerText = user;

/* DATA */
function getData(){
  return JSON.parse(localStorage.getItem("projects")) || [];
}

function save(data){
  localStorage.setItem("projects", JSON.stringify(data));
}

/* ADD */
function add(){
  let data = getData();

  let u = document.getElementById("user").value;
  let n = document.getElementById("name").value;
  let l = document.getElementById("link").value;

  if(!u || !n || !l) return alert("Fill all fields");

  if(!l.startsWith("http")){
    l = "https://" + l;
  }

  data.push({user:u, name:n, link:l});
  save(data);
  render();
}

/* DELETE */
function del(i){
  let data = getData();
  data.splice(i,1);
  save(data);
  render();
}

/* EDIT */
function edit(i){
  let data = getData();

  let u = prompt("Username", data[i].user);
  let n = prompt("Project", data[i].name);
  let l = prompt("Link", data[i].link);

  if(u && n && l){
    if(!l.startsWith("http")){
      l = "https://" + l;
    }

    data[i] = {user:u, name:n, link:l};
    save(data);
    render();
  }
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("user");
  window.location.href = "index.html";
}

/* RENDER */
function render(){
  let data = getData();
  let table = document.getElementById("table");

  table.innerHTML = "";

  data.forEach((p,i)=>{
    table.innerHTML += `
      <tr>
        <td>${p.user}</td>
        <td>${p.name}</td>
        <td><a href="${p.link}" target="_blank">Open</a></td>
        <td>
          <button class="edit" onclick="edit(${i})">Edit</button>
          <button class="del" onclick="del(${i})">Delete</button>
        </td>
      </tr>
    `;
  });
}

render();

</script>

</body>
</html>
