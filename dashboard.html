<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard CRUD</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
  display: flex;
}

.sidebar {
  width: 200px;
  background: #111827;
  padding: 20px;
  height: 100vh;
}

.main {
  flex: 1;
  padding: 20px;
}

input {
  padding: 8px;
  margin: 5px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 8px 12px;
  background: #38bdf8;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.card {
  background: #1e293b;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}

.btn {
  margin-right: 5px;
  background: #22c55e;
  color: black;
  font-size: 12px;
}
.btn.delete {
  background: #ef4444;
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("auth") !== "true") {
  window.location.href = "index.html";
}
</script>

<div class="sidebar">
  <h2>🚀 Projects</h2>
</div>

<div class="main">

<h2>Add Project ➕</h2>

<input id="name" placeholder="Project name">
<input id="link" placeholder="Project link">
<button onclick="addProject()">Add</button>

<div id="list"></div>

</div>

<script>

let projects = JSON.parse(localStorage.getItem("projects")) || [];

// render
function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  projects.forEach((p, i) => {
    list.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <a href="${p.link}" target="_blank">${p.link}</a>
        <br><br>

        <button class="btn" onclick="editProject(${i})">Edit</button>
        <button class="btn delete" onclick="deleteProject(${i})">Delete</button>
      </div>
    `;
  });

  localStorage.setItem("projects", JSON.stringify(projects));
}

// add
function addProject() {
  const name = document.getElementById("name").value;
  const link = document.getElementById("link").value;

  if(!name || !link) return alert("Fill all fields ❌");

  projects.push({name, link});

  document.getElementById("name").value = "";
  document.getElementById("link").value = "";

  render();
}

// delete
function deleteProject(i) {
  projects.splice(i, 1);
  render();
}

// edit
function editProject(i) {
  const newName = prompt("New name", projects[i].name);
  const newLink = prompt("New link", projects[i].link);

  if(newName && newLink) {
    projects[i] = {name: newName, link: newLink};
    render();
  }
}

render();

</script>

</body>
</html>
