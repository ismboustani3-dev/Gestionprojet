<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra Admin Full System</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: radial-gradient(circle at top,#0a0f1c,#050814);
  color:white;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:240px;
  height:100vh;
  background: rgba(17,24,39,0.65);
  padding:20px;
  border-right:1px solid rgba(255,255,255,0.08);
}

.sidebar h2{color:#38bdf8;}

/* TOPBAR */
.topbar{
  position:fixed;
  top:0;
  left:240px;
  right:0;
  height:60px;
  background: rgba(17,24,39,0.5);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
}

.main{
  margin-left:240px;
  margin-top:60px;
  padding:20px;
}

.card{
  background:#111827;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);
}

button{
  padding:8px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#38bdf8;
  color:white;
}

.danger{background:#ef4444;}

.link{
  color:#38bdf8;
  word-break:break-all;
}

input{
  padding:8px;
  margin:5px;
  border-radius:8px;
  border:none;
  background:#111827;
  color:white;
}

</style>
</head>

<body>

<div class="sidebar">
  <h2>⚡ Ultra Admin</h2>
</div>

<div class="topbar">
  <span>Admin Control Panel</span>
  <button onclick="logout()">Logout</button>
</div>

<div class="main">

<h3>➕ Add User</h3>

<input id="newUser" placeholder="Username">
<input id="newPass" placeholder="Password">
<button onclick="addUser()">Add User</button>

<hr>

<h3>👥 Users</h3>
<div id="users"></div>

</div>

<script>

/* INIT SYSTEM */
if(!localStorage.getItem("users")){
  let demo = [
    {
      username:"user1",
      password:"1234",
      projects:[
        {id:1,name:"Google",link:"https://google.com"},
        {id:2,name:"GitHub",link:"https://github.com"}
      ]
    },
    {
      username:"user2",
      password:"1234",
      projects:[
        {id:3,name:"YouTube",link:"https://youtube.com"}
      ]
    }
  ];
  localStorage.setItem("users", JSON.stringify(demo));
}

/* AUTH */
if(localStorage.getItem("auth") !== "true"){
  location.href="index.html";
}

/* DATA */
function getUsers(){
  return JSON.parse(localStorage.getItem("users")) || [];
}

function saveUsers(d){
  localStorage.setItem("users", JSON.stringify(d));
}

/* ADD USER */
function addUser(){
  let u = document.getElementById("newUser").value;
  let p = document.getElementById("newPass").value;

  if(!u || !p){
    alert("Fill all");
    return;
  }

  let d = getUsers();

  let exists = d.find(x=>x.username===u);
  if(exists){
    alert("User already exists");
    return;
  }

  d.push({
    username:u,
    password:p,
    projects:[]
  });

  saveUsers(d);
  render();
}

/* DELETE USER */
function deleteUser(name){
  let d = getUsers().filter(u=>u.username!==name);
  saveUsers(d);
  render();
}

/* EDIT PASSWORD */
function editPass(name){
  let d = getUsers();
  let u = d.find(x=>x.username===name);

  let np = prompt("New password", u.password);
  if(np){
    u.password = np;
    saveUsers(d);
  }
  render();
}

/* ADD PROJECT TO USER */
function addProject(user){
  let name = prompt("Project name");
  let link = prompt("Project link");

  if(!name || !link) return;

  let d = getUsers();
  let u = d.find(x=>x.username===user);

  u.projects.push({
    id:Date.now(),
    name,
    link: link.startsWith("http") ? link : "https://"+link
  });

  saveUsers(d);
  render();
}

/* DELETE PROJECT */
function deleteProject(user,id){
  let d = getUsers();
  let u = d.find(x=>x.username===user);

  u.projects = u.projects.filter(p=>p.id!==id);

  saveUsers(d);
  render();
}

/* RENDER */
function render(){
  let d = getUsers();
  let box = document.getElementById("users");
  box.innerHTML = "";

  d.forEach(u=>{

    let projects = u.projects.map(p=>`
      <li>
        ${p.name} -
        <a class="link" href="${p.link}" target="_blank">${p.link}</a>

        <button onclick="deleteProject('${u.username}',${p.id})">del</button>
      </li>
    `).join("");

    box.innerHTML += `
      <div class="card">
        <h3>👤 ${u.username}</h3>
        <p>🔑 Password: ${u.password}</p>

        <h4>📁 Projects</h4>
        <ul>${projects}</ul>

        <button onclick="addProject('${u.username}')">+ Add Project</button>
        <button onclick="editPass('${u.username}')">Edit Password</button>
        <button class="danger" onclick="deleteUser('${u.username}')">Delete User</button>
      </div>
    `;
  });
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("auth");
  location.href="index.html";
}

render();

</script>

</body>
</html>
