<div class="container">

  <!-- ✅ STATS FIRST -->
  <div class="card">
    <h3>📊 Stats</h3>

    <div class="stats">
      <div class="stat">
        <h2 id="totalProjects">0</h2>
        <p>Projects</p>
      </div>

      <div class="stat">
        <h2 id="totalUsers">0</h2>
        <p>Users</p>
      </div>
    </div>
  </div>

  <!-- ✅ ADD PROJECT AFTER -->
  <div class="card">
    <h3>➕ Add Project</h3>

    <input id="user" placeholder="Username">
    <input id="name" placeholder="Project name">
    <input id="link" placeholder="Project link">
    <button onclick="add()">Add</button>
  </div>

  <!-- SEARCH -->
  <div class="card">
    🔍 <input id="search" oninput="render()" placeholder="Search by username">
  </div>

  <!-- TABLE -->
  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Username</th>
          <th>Project</th>
          <th>Link</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>

</div>
