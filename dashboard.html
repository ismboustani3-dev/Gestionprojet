<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard Pro UI</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#0a0f1c;
  color:white;
}

/* SIDEBAR FIXED */
.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:220px;
  height:100vh;
  background:#111827;
  padding:20px;
}

.sidebar h2{
  color:#38bdf8;
}

/* TOPBAR FIXED */
.topbar{
  position:fixed;
  top:0;
  left:220px;
  right:0;
  height:60px;
  background:#111827;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  padding:0 20px;
}

/* USER MENU */
.userMenu{
  position:relative;
  cursor:pointer;
}

.userMenu span{
  margin-right:5px;
}

.dropdown{
  position:absolute;
  right:0;
  top:40px;
  background:#1f2937;
  border-radius:10px;
  display:none;
  overflow:hidden;
  min-width:150px;
}

.dropdown div{
  padding:10px;
  cursor:pointer;
}

.dropdown div:hover{
  background:#374151;
}

/* MAIN */
.main{
  margin-left:220px;
  margin-top:60px;
  padding:20px;
}

/* CARD */
.card{
  background:#111827;
  padding:15px;
  border-radius:12px;
  margin-top:15px;
}

/* INPUT */
input,button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
}

input{
  background:#1f2937;
  color:white;
}

button{
  background:#38bdf8;
  color:white;
  cursor:pointer;
}

/* ACTION */
.delete{ color:red; cursor:pointer; }
.edit{ color:orange; cursor:pointer; margin-left:10px; }
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>⚡ Dashboard</h2>
</div>

<!-- TOPBAR -->
<div class="topbar">

  <div class="userMenu" onclick="toggleMenu()">
    👤 <span id="username"></span> ▼

    <div id="menu" class="dropdown">
      <div onclick="openSettings()">⚙️ Settings</div>
      <div onclick="logout()">🚪 Logout</div>
    </div>
  </div>

</div>

<!-- MAIN -->
<div class="main">

  <!-- SETTINGS -->
  <div id="settingsBox" class="card" style="display:none;">
    <h3>⚙️ Change Password</h3>

    <input id="oldPass" type="password" placeholder="Old password">
    <input id="newPass" type="password" placeholder="New password">

    <button onclick="changePassword()">Change</button>
  </div>

  <!-- ADD -->
  <div class="card">
    <h3>➕ Add Project</h3>

    <input id="user" placeholder="Username">
    <input id="name" placeholder="Project name">
    <input id="link" placeholder="Project link">

    <button onclick="add()">Add</button>
  </div>

  <!-- LIST -->
  <div id="list"></div>

</div>

<script>

/* PROTECT */
if(localStorage.getItem("auth") !== "true"){
  location.href="index.html";
}

/* USER NAME */
document.getElementById("username").innerText =
  localStorage.getItem("user");

/* DROPDOWN */
function toggleMenu(){
  let m = document.getElementById("menu");
  m.style.display = m.style.display === "block" ? "none" : "block";
}

/* OPEN SETTINGS */
function openSettings(){
  document.getElementById("settingsBox").style.display="block";
}

/* CHANGE PASSWORD */
function changePassword(){
  let oldP = document.getElementById("oldPass").value;
  let newP = document.getElementById("newPass").value;

  let saved = localStorage.getItem("admin_pass");

  if(oldP !== saved){
    alert("Wrong old password");
    return;
  }

  localStorage.setItem("admin_pass", newP);
  alert("Password updated!");
}

/* DATA */
function getData(){
  return JSON.parse(localStorage.getItem("projects")) || [];
}

function save(d){
  localStorage.setItem("projects", JSON.stringify(d));
}

/* ADD */
function add(){
  let d = getData();

  let user = document.getElementById("user").value;
  let name = document.getElementById("name").value;
  let link = document.getElementById("link").value;

  if(!user || !name || !link){
    alert("Fill all");
    return;
  }

  if(!link.startsWith("http")){
    link = "https://" + link;
  }

  d.push({id:Date.now(), user, name, link});
  save(d);

  render();
}

/* DELETE */
function del(id){
  let d = getData().filter(x => x.id !== id);
  save(d);
  render();
}

/* EDIT */
function edit(id){
  let d = getData();
  let p = d.find(x => x.id === id);

  let n = prompt("Edit name", p.name);
  if(n) p.name = n;

  let l = prompt("Edit link", p.link);
  if(l){
    if(!l.startsWith("http")) l="https://"+l;
    p.link = l;
  }

  save(d);
  render();
}

/* RENDER */
function render(){
  let d = getData();

  let html = d.map(p => `
    <div class="card">
      <b>${p.user}</b> - ${p.name}<br>
      <a href="${p.link}" target="_blank">${p.link}</a><br><br>

      <span class="delete" onclick="del(${p.id})">delete</span>
      <span class="edit" onclick="edit(${p.id})">edit</span>
    </div>
  `).join("");

  document.getElementById("list").innerHTML = html;
}

render();

/* LOGOUT */
function logout(){
  localStorage.clear();
  location.href="index.html";
}

</script>

</body>
</html>
