<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard Pro</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#0a0f1c;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  background: rgba(17,24,39,0.8);
  backdrop-filter: blur(10px);
  padding:20px;
  border-right:1px solid rgba(255,255,255,0.05);
}

.sidebar h2{ color:#38bdf8; }
.sidebar p{ opacity:0.6; font-size:13px; }

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background: rgba(17,24,39,0.6);
  border-radius:12px;
  backdrop-filter: blur(10px);
}

/* INPUTS */
input,button{
  padding:12px;
  margin:5px;
  border:none;
  border-radius:10px;
}

input{
  background:#111827;
  color:white;
  outline:none;
}

input:focus{
  box-shadow:0 0 10px #38bdf8;
}

button{
  background:linear-gradient(45deg,#38bdf8,#0ea5e9);
  color:white;
  cursor:pointer;
}

/* SEARCH */
#search{
  width:100%;
  margin:10px 0;
}

/* STATS */
.stats{
  display:flex;
  gap:10px;
  margin:15px 0;
}

.stat{
  flex:1;
  padding:12px;
  border-radius:12px;
  background: rgba(17,24,39,0.7);
  color:#38bdf8;
}

/* GRID */
.users{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:15px;
}

/* CARD */
.card{
  background: rgba(17,24,39,0.6);
  padding:15px;
  border-radius:15px;
  border:1px solid rgba(56,189,248,0.15);
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:8px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

th{ color:#38bdf8; }

a{
  color:#38bdf8;
  text-decoration:none;
}

.delete{ color:#ef4444; cursor:pointer; margin-left:6px; }
.edit{ color:#facc15; cursor:pointer; margin-left:6px; }

/* CHART */
canvas{
  background: rgba(17,24,39,0.6);
  border-radius:12px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>⚡ Dashboard</h2>
  <p>Projects Manager</p>
</div>

<div class="main">

  <div class="topbar">
    <h3>📊 Dashboard</h3>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat">👤 Users: <span id="totalUsers">0</span></div>
    <div class="stat">📁 Projects: <span id="totalProjects">0</span></div>
  </div>

  <!-- FORM -->
  <div>
    <input id="user" placeholder="Username">
    <input id="name" placeholder="Project name">
    <input id="link" placeholder="Project link">
    <button onclick="add()">Add</button>
  </div>

  <!-- SEARCH -->
  <input id="search" placeholder="🔍 Search..." oninput="render()">

  <!-- CHART -->
  <canvas id="chart" width="400" height="120"></canvas>

  <!-- USERS -->
  <div id="users" class="users"></div>

</div>

<script>

/* AUTH */
if(localStorage.getItem("auth") !== "true"){
  window.location.href = "index.html";
}

/* DATA */
function getData(){
  return JSON.parse(localStorage.getItem("projects")) || [];
}

function save(data){
  localStorage.setItem("projects", JSON.stringify(data));
}

/* ADD */
function add(){
  let data = getData();

  let user = document.getElementById("user").value;
  let name = document.getElementById("name").value;
  let link = document.getElementById("link").value;

  if(!user || !name || !link) return alert("Fill all");

  if(!link.startsWith("http")) link = "https://" + link;

  data.push({
    id: Date.now(),
    user,
    name,
    link
  });

  save(data);

  document.getElementById("user").value="";
  document.getElementById("name").value="";
  document.getElementById("link").value="";

  render();
}

/* DELETE PROJECT */
function removeProject(id){
  let data = getData().filter(p => p.id !== id);
  save(data);
  render();
}

/* DELETE USER */
function removeUser(user){
  if(!confirm("Delete user " + user + " ?")) return;
  let data = getData().filter(p => p.user !== user);
  save(data);
  render();
}

/* EDIT */
function editProject(id){
  let data = getData();
  let p = data.find(x => x.id === id);

  let newName = prompt("Edit name:", p.name);
  if(newName) p.name = newName;

  let newLink = prompt("Edit link:", p.link);
  if(newLink){
    if(!newLink.startsWith("http")) newLink = "https://" + newLink;
    p.link = newLink;
  }

  save(data);
  render();
}

/* STATS */
function updateStats(data){
  document.getElementById("totalUsers").innerText =
    new Set(data.map(p=>p.user)).size;

  document.getElementById("totalProjects").innerText =
    data.length;
}

/* CHART */
function drawChart(data){
  let c = document.getElementById("chart");
  let ctx = c.getContext("2d");

  ctx.clearRect(0,0,c.width,c.height);

  let map = {};

  data.forEach(p=>{
    map[p.user] = (map[p.user] || 0) + 1;
  });

  let keys = Object.keys(map);
  let max = Math.max(...Object.values(map), 1);

  keys.forEach((k,i)=>{
    let h = (map[k] / max) * 100;

    ctx.fillStyle = "#38bdf8";
    ctx.fillRect(i*60,110-h,40,h);

    ctx.fillStyle = "white";
    ctx.fillText(k, i*60, 115);
  });
}

/* RENDER */
function render(){
  let data = getData();

  let q = document.getElementById("search").value?.toLowerCase() || "";

  let filtered = data.filter(p =>
    p.user.toLowerCase().includes(q) ||
    p.name.toLowerCase().includes(q)
  );

  let container = document.getElementById("users");
  container.innerHTML = "";

  if(filtered.length === 0){
    container.innerHTML = "<p>No data</p>";
    updateStats(data);
    drawChart(data);
    return;
  }

  let grouped = {};

  filtered.forEach(p=>{
    if(!grouped[p.user]) grouped[p.user] = [];
    grouped[p.user].push(p);
  });

  for(let user in grouped){

    let projects = grouped[user];

    let rows = projects.map(p=>`
      <tr>
        <td>
          ${p.name}
          <div style="font-size:11px;opacity:0.6">${p.link}</div>
        </td>

        <td>
          <a href="${p.link}" target="_blank">open</a>
        </td>

        <td>
          <span class="delete" onclick="removeProject(${p.id})">del</span>
          <span class="edit" onclick="editProject(${p.id})">edit</span>
        </td>
      </tr>
    `).join("");

    container.innerHTML += `
      <div class="card">

        <div style="display:flex;justify-content:space-between;align-items:center;">
          <h3>👤 ${user}</h3>

          <button onclick="removeUser('${user}')" style="background:#ef4444;padding:6px 10px;border:none;border-radius:8px;color:white;cursor:pointer;">
            Delete User
          </button>
        </div>

        <div style="font-size:12px;opacity:0.6;margin-bottom:8px;">
          📁 ${projects.length} projects
        </div>

        <table>
          <tr><th>Project</th><th>Link</th><th>Action</th></tr>
          ${rows}
        </table>

      </div>
    `;
  }

  updateStats(data);
  drawChart(data);
}

render();

function logout(){
  localStorage.clear();
  location.href="index.html";
}

</script>

</body>
</html>
