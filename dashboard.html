<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial;
  background:#0b1220;
  color:white;
}

/* TOPBAR */
.topbar{
  padding:12px 20px;
  background:#111827;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* CONTAINER */
.container{
  padding:15px 20px;
  max-width:1200px;
  margin:auto;
}

/* ROW (ADD + STATS SIDE BY SIDE) */
.row{
  display:flex;
  gap:15px;
  margin-bottom:15px;
}

/* CARDS */
.card{
  background:#111827;
  padding:15px;
  border-radius:12px;
  flex:1;
}

/* TITLES */
h3{
  margin-bottom:10px;
}

/* INPUTS */
input{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#0f172a;
  color:white;
}

/* BUTTON */
button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  cursor:pointer;
  color:black;
}

/* STATS */
.stats{
  display:flex;
  gap:10px;
}

.stat{
  flex:1;
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th, td{
  padding:12px;
  border-bottom:1px solid #2d3748;
}

th{
  background:#1e293b;
  color:#38bdf8;
}

/* LINKS */
a{
  color:#38bdf8;
}

/* ACTION BUTTONS */
.edit{
  background:#22c55e;
  padding:5px 8px;
  border-radius:6px;
  border:none;
  cursor:pointer;
  color:white;
}

.del{
  background:#ef4444;
  padding:5px 8px;
  border-radius:6px;
  border:none;
  cursor:pointer;
  color:white;
}

/* RESPONSIVE */
@media(max-width:768px){
  .row{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <h3>📊 Dashboard</h3>
  <button onclick="logout()" style="background:#ef4444;">Logout</button>
</div>

<div class="container">

<!-- 🔥 ROW (ADD + STATS) -->
<div class="row">

  <!-- ADD PROJECT -->
  <div class="card">
    <h3>➕ Add Project</h3>

    <input id="user" placeholder="Username">
    <input id="name" placeholder="Project name">
    <input id="link" placeholder="Project link">
    <button onclick="add()">Add</button>
  </div>

  <!-- STATS -->
  <div class="card">
    <h3>📊 Stats</h3>

    <div class="stats">
      <div class="stat">
        <h2 id="totalProjects">0</h2>
        <p>Projects</p>
      </div>

      <div class="stat">
        <h2 id="totalUsers">0</h2>
        <p>Users</p>
      </div>
    </div>
  </div>

</div>

<!-- SEARCH -->
<div class="card">
  🔍 <input id="search" oninput="render()" placeholder="Search by username">
</div>

<!-- TABLE -->
<div class="card">
  <table>
    <thead>
      <tr>
        <th>Username</th>
        <th>Project</th>
        <th>Link</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>

</div>

<script>

/* DATA */
function getData(){
  return JSON.parse(localStorage.getItem("projects")) || [];
}

function save(data){
  localStorage.setItem("projects", JSON.stringify(data));
}

/* ADD */
function add(){
  let data = getData();

  let user = document.getElementById("user").value;
  let name = document.getElementById("name").value;
  let link = document.getElementById("link").value;

  if(!user || !name || !link){
    return alert("Fill all fields");
  }

  if(!link.startsWith("http")){
    link = "https://" + link;
  }

  data.push({user, name, link});
  save(data);

  document.getElementById("user").value="";
  document.getElementById("name").value="";
  document.getElementById("link").value="";

  render();
}

/* DELETE */
function del(i){
  let data = getData();
  data.splice(i,1);
  save(data);
  render();
}

/* EDIT */
function edit(i){
  let data = getData();

  let u = prompt("Username", data[i].user);
  let n = prompt("Project", data[i].name);
  let l = prompt("Link", data[i].link);

  if(u && n && l){

    if(!l.startsWith("http")){
      l = "https://" + l;
    }

    data[i] = {user:u, name:n, link:l};
    save(data);
    render();
  }
}

/* RENDER */
function render(){
  let data = getData();
  let search = document.getElementById("search").value.toLowerCase();

  let table = document.getElementById("table");
  table.innerHTML = "";

  let filtered = data.filter(p =>
    p.user.toLowerCase().includes(search)
  );

  document.getElementById("totalProjects").innerText = data.length;
  document.getElementById("totalUsers").innerText =
    [...new Set(data.map(p => p.user))].length;

  filtered.forEach((p,i)=>{
    table.innerHTML += `
      <tr>
        <td>${p.user}</td>
        <td>${p.name}</td>
        <td><a href="${p.link}" target="_blank">${p.link}</a></td>
        <td>
          <button class="edit" onclick="edit(${i})">Edit</button>
          <button class="del" onclick="del(${i})">Delete</button>
        </td>
      </tr>
    `;
  });
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("user");
  window.location.href="index.html";
}

/* INIT */
render();

</script>

</body>
</html>
