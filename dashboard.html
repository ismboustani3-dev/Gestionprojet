<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0f1c;
  color: white;
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 240px;
  height: 100vh;
  background: rgba(17,24,39,0.9);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-right: 1px solid #1f2937;
}

.sidebar h2 {
  font-size: 18px;
  margin-bottom: 25px;
}

.sidebar a {
  display: block;
  color: #94a3b8;
  text-decoration: none;
  margin: 12px 0;
  transition: 0.2s;
}

.sidebar a:hover {
  color: white;
  transform: translateX(5px);
}

/* Main */
.main {
  flex: 1;
  padding: 30px;
}

/* Header */
h2 {
  font-size: 24px;
}

/* Inputs */
input {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #111827;
  color: white;
}

/* Button */
button {
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg,#38bdf8,#6366f1);
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

/* Grid */
#list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 15px;
  margin-top: 20px;
}

/* Card */
.card {
  background: rgba(31,41,55,0.8);
  backdrop-filter: blur(10px);
  padding: 15px;
  border-radius: 16px;
  border: 1px solid #1f2937;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  border-color: #38bdf8;
}

/* Links */
.card a {
  color: #38bdf8;
  font-size: 13px;
  word-break: break-all;
}

/* Small buttons */
.btn {
  margin-top: 10px;
  padding: 6px 10px;
  font-size: 12px;
  border-radius: 8px;
  background: #22c55e;
  color: black;
}

.btn.delete {
  background: #ef4444;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>🚀 Dashboard</h2>
  <a href="#">Home</a>
  <a href="#">Projects</a>
  <a href="#">Settings</a>
</div>

<div class="main">

<h2>My Projects</h2>

<input id="name" placeholder="Project name">
<input id="link" placeholder="Project link">
<button onclick="addProject()">Add Project</button>

<div id="list"></div>

</div>

<script>
if(localStorage.getItem("auth") !== "true") {
  window.location.href = "index.html";
}

let projects = JSON.parse(localStorage.getItem("projects")) || [];

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  projects.forEach((p, i) => {
    list.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <a href="${p.link}" target="_blank">${p.link}</a>
        <br>

        <button class="btn" onclick="editProject(${i})">Edit</button>
        <button class="btn delete" onclick="deleteProject(${i})">Delete</button>
      </div>
    `;
  });

  localStorage.setItem("projects", JSON.stringify(projects));
}

function addProject() {
  const name = document.getElementById("name").value;
  const link = document.getElementById("link").value;

  if(!name || !link) return alert("Fill fields");

  projects.push({name, link});
  render();
}

function deleteProject(i) {
  projects.splice(i, 1);
  render();
}

function editProject(i) {
  const n = prompt("Name", projects[i].name);
  const l = prompt("Link", projects[i].link);

  if(n && l) {
    projects[i] = {name:n, link:l};
    render();
  }
}

render();
</script>

</body>
</html>
