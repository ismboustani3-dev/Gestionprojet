<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
push,
set,
onValue,
remove,
update
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE */

const firebaseConfig = {

  apiKey: "AIzaSyDkx9FZ_TjNYzz9J6-rdtkKk72HCu1bSOY",

  authDomain: "ismail-f50ba.firebaseapp.com",

  databaseURL: "https://ismail-f50ba-default-rtdb.firebaseio.com",

  projectId: "ismail-f50ba",

  storageBucket: "ismail-f50ba.firebasestorage.app",

  messagingSenderId: "580219017127",

  appId: "1:580219017127:web:5128b2d18bec1c3b4a4882",

  measurementId: "G-F8K5JWTJS0"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

/* AUTH */

if(localStorage.getItem("auth") !== "true"){
  location.href = "index.html";
}

/* USER */

let currentUser =
localStorage.getItem("user") || "Admin";

document.getElementById("username")
.innerText = currentUser;

document.getElementById("avatar")
.innerText =
currentUser.charAt(0).toUpperCase();

/* TOAST */

function toast(msg){

  let t = document.getElementById("toast");

  t.innerText = msg;

  t.style.display = "block";

  setTimeout(()=>{
    t.style.display = "none";
  },3000);

}

/* MENU */

window.toggleMenu = function(){

  let m =
  document.getElementById("adminMenu");

  m.style.display =
  m.style.display === "block"
  ? "none"
  : "block";

}

/* LOGOUT */

window.logout = function(){

  localStorage.removeItem("auth");

  localStorage.removeItem("user");

  location.href = "index.html";

}

/* PASSWORD */

window.changePassword = function(){

  let old = prompt("Current password");

  if(old !== localStorage.getItem("admin_pass")){
    toast("Wrong password");
    return;
  }

  let np = prompt("New password");

  if(np){

    localStorage.setItem("admin_pass",np);

    toast("Password updated");

  }

}

/* ADD PROJECT */

window.addProject = async function(){

  let user =
  document.getElementById("user").value.trim();

  let project =
  document.getElementById("project").value.trim();

  let link =
  document.getElementById("link").value.trim();

  if(!user || !project || !link){

    toast("Fill all fields");

    return;

  }

  if(!link.startsWith("http")){
    link = "https://" + link;
  }

  const newRef =
  push(ref(db,"projects"));

  await set(newRef,{

    user,
    project,
    link,
    status:"online"

  });

  document.getElementById("user").value="";
  document.getElementById("project").value="";
  document.getElementById("link").value="";

  toast("Project added");

}

/* DELETE */

window.deleteProject = async function(id){

  await remove(ref(db,"projects/" + id));

  toast("Deleted");

}

/* EDIT */

window.editProject = async function(id,data){

  let newName =
  prompt("Edit project",data.project);

  let newLink =
  prompt("Edit link",data.link);

  if(!newName || !newLink) return;

  if(!newLink.startsWith("http")){
    newLink = "https://" + newLink;
  }

  await update(ref(db,"projects/" + id),{

    project:newName,
    link:newLink

  });

  toast("Updated");

}

/* REALTIME RENDER */

const projectsRef = ref(db,"projects");

onValue(projectsRef,(snapshot)=>{

  let data = snapshot.val() || {};

  let box =
  document.getElementById("list");

  box.innerHTML = "";

  let users = new Set();

  let total = 0;

  let online = 0;

  let grouped = {};

  Object.entries(data).forEach(([id,p])=>{

    users.add(p.user);

    total++;

    if(p.status==="online"){
      online++;
    }

    if(!grouped[p.user]){
      grouped[p.user] = [];
    }

    grouped[p.user].push({
      id,
      ...p
    });

  });

  document.getElementById("usersCount")
  .innerText = users.size;

  document.getElementById("projectsCount")
  .innerText = total;

  document.getElementById("onlineCount")
  .innerText = online;

  for(let user in grouped){

    let html = "";

    grouped[user].forEach(p=>{

      html += `

      <div class="project">

        <h3>${p.project}</h3>

        <a href="${p.link}" target="_blank">
          ${p.link}
        </a>

        <div class="actions">

          <button
          class="delete"
          onclick="deleteProject('${p.id}')">
          Delete
          </button>

          <button
          class="edit"
          onclick='editProject("${p.id}", ${JSON.stringify(p)})'>
          Edit
          </button>

        </div>

      </div>

      `;

    });

    box.innerHTML += `

    <div class="card">

      <div class="user-title">

        <div class="user-avatar">
          ${user.charAt(0).toUpperCase()}
        </div>

        <h2>${user}</h2>

      </div>

      ${html}

    </div>

    `;

  }

});

</script>
