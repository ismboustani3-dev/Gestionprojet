<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Nested System</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#0b1220;
  color:white;
}

.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:220px;
  height:100vh;
  background:#111827;
  padding:15px;
}

.container{
  margin-left:220px;
  padding:20px;
}

/* TABLE USERS */
table{
  width:100%;
  border-collapse:collapse;
  background:#111827;
  border-radius:12px;
  overflow:hidden;
}

th{
  text-align:left;
  padding:12px;
  color:#38bdf8;
  border-bottom:1px solid #1f2937;
}

td{
  padding:12px;
  border-bottom:1px solid #1f2937;
}

tr:hover{
  background:#0f172a;
  cursor:pointer;
}

/* PROJECT BOX */
.projects{
  margin-top:10px;
  background:#0f172a;
  padding:10px;
  border-radius:10px;
}

/* BUTTONS */
button{
  padding:6px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin:2px;
  color:white;
}

.edit{background:#facc15;}
.del{background:#ef4444;}
.add{background:#38bdf8;}

input{
  padding:8px;
  margin:4px;
  border-radius:8px;
  border:none;
  background:#1f2937;
  color:white;
}

.userRow{
  font-weight:bold;
  color:#38bdf8;
}

.small{
  font-size:12px;
  opacity:0.8;
}

</style>
</head>

<body>

<div class="sidebar">
  <h2>⚡ ADMIN</h2>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">

<h2>👤 Users Management (Nested Projects)</h2>

<div>
  <input id="u" placeholder="User">
  <input id="p" placeholder="Project">
  <input id="l" placeholder="Link">
  <button class="add" onclick="add()">Add</button>
</div>

<br>

<table>
  <thead>
    <tr>
      <th>User</th>
      <th>Projects</th>
      <th>Actions</th>
    </tr>
  </thead>

  <tbody id="table"></tbody>
</table>

</div>

<script>

/* AUTH */
if(localStorage.getItem("auth")!=="true"){
  location.href="index.html";
}

/* STORAGE */
function get(){
  return JSON.parse(localStorage.getItem("data"))||[];
}
function save(d){
  localStorage.setItem("data",JSON.stringify(d));
}

/* INIT SAMPLE */
if(!localStorage.getItem("data")){
  save([
    {id:1,user:"user1",projects:[
      {pid:11,name:"site A",link:"https://google.com"}
    ]},
    {id:2,user:"user2",projects:[
      {pid:21,name:"app B",link:"https://github.com"}
    ]}
  ]);
}

/* ADD */
function add(){
  let d=get();

  let u=document.getElementById("u").value;
  let p=document.getElementById("p").value;
  let l=document.getElementById("l").value;

  if(!l.startsWith("http")) l="https://"+l;

  let user=d.find(x=>x.user===u);

  if(!user){
    d.push({
      id:Date.now(),
      user:u,
      projects:[{pid:Date.now(),name:p,link:l}]
    });
  }else{
    user.projects.push({pid:Date.now(),name:p,link:l});
  }

  save(d);
  render();
}

/* DELETE USER */
function delUser(id){
  save(get().filter(x=>x.id!==id));
  render();
}

/* DELETE PROJECT */
function delProject(uid,pid){
  let d=get();
  let u=d.find(x=>x.id===uid);

  u.projects=u.projects.filter(p=>p.pid!==pid);

  save(d);
  render();
}

/* EDIT PROJECT */
function editProject(uid,pid){
  let d=get();
  let u=d.find(x=>x.id===uid);
  let p=u.projects.find(x=>x.pid===pid);

  let n=prompt("Project name",p.name);
  let l=prompt("Link",p.link);

  if(n) p.name=n;
  if(l) p.link=l;

  save(d);
  render();
}

/* RENDER */
function render(){
  let d=get();
  let box=document.getElementById("table");
  box.innerHTML="";

  d.forEach(u=>{

    let projects=u.projects.map(p=>`
      <div class="projects">
        📁 ${p.name}<br>
        <span class="small">${p.link}</span><br>
        <button class="edit" onclick="editProject(${u.id},${p.pid})">Edit</button>
        <button class="del" onclick="delProject(${u.id},${p.pid})">Delete</button>
      </div>
    `).join("");

    box.innerHTML+=`
      <tr>
        <td class="userRow">${u.user}</td>
        <td>${projects}</td>
        <td>
          <button class="del" onclick="delUser(${u.id})">Delete User</button>
        </td>
      </tr>
    `;
  });
}

/* LOGOUT */
function logout(){
  localStorage.clear();
  location.href="index.html";
}

render();

</script>

</body>
</html>
