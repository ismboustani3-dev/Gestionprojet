<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body{
  font-family:Arial;
  background:#0b1220;
  color:white;
}

.topbar{
  padding:15px;
  background:#111827;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  padding:20px;
}

input,button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
}

input{
  background:#0f172a;
  color:white;
}

button{
  background:#38bdf8;
  cursor:pointer;
}

.logout{
  background:#ef4444;
}

.users{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:15px;
}

.card{
  background:#111827;
  padding:15px;
  border-radius:12px;
}

table{
  width:100%;
  border-collapse:collapse;
}

td,th{
  padding:8px;
  border-bottom:1px solid #2d3748;
}

th{ color:#38bdf8; }

.delete{
  color:red;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">
  <h2>📊 Welcome <span id="username"></span></h2>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="container">

  <div>
    <input id="user" placeholder="Username">
    <input id="name" placeholder="Project name">
    <input id="link" placeholder="Project link">
    <button onclick="add()">Add</button>
  </div>

  <div id="users" class="users"></div>

</div>

<script>

/* حماية الصفحة */
if(localStorage.getItem("auth") !== "true"){
  window.location.href = "index.html";
}

document.getElementById("username").innerText = localStorage.getItem("user");

/* data */
function getData(){
  return JSON.parse(localStorage.getItem("projects")) || [];
}

function save(data){
  localStorage.setItem("projects", JSON.stringify(data));
}

/* add */
function add(){
  let data = getData();

  let user = document.getElementById("user").value;
  let name = document.getElementById("name").value;
  let link = document.getElementById("link").value;

  if(!user || !name || !link){
    alert("Fill all fields");
    return;
  }

  if(!link.startsWith("http")){
    link = "https://" + link;
  }

  data.push({
    id: Date.now(),
    user,
    name,
    link
  });

  save(data);
  render();
}

/* delete */
function remove(id){
  let data = getData().filter(p => p.id !== id);
  save(data);
  render();
}

/* logout */
function logout(){
  localStorage.removeItem("auth");
  localStorage.removeItem("user");
  window.location.href = "index.html";
}

/* render */
function render(){
  let data = getData();
  let container = document.getElementById("users");
  container.innerHTML = "";

  let grouped = {};

  data.forEach(p=>{
    if(!grouped[p.user]) grouped[p.user] = [];
    grouped[p.user].push(p);
  });

  for(let user in grouped){
    let rows = grouped[user].map(p=>`
      <tr>
        <td>${p.name}</td>
        <td><a href="${p.link}" target="_blank">open</a></td>
        <td><span class="delete" onclick="remove(${p.id})">delete</span></td>
      </tr>
    `).join("");

    container.innerHTML += `
      <div class="card">
        <h3>👤 ${user}</h3>
        <table>
          <tr>
            <th>Project</th>
            <th>Link</th>
            <th>Action</th>
          </tr>
          ${rows}
        </table>
      </div>
    `;
  }
}

render();

</script>

</body>
</html>
