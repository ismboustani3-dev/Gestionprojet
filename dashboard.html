<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard Pro</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#0a0f1c;
  color:white;
  display:flex;
}

.sidebar{
  width:220px;
  height:100vh;
  background:#111827;
  padding:20px;
}

.sidebar h2{ color:#38bdf8; }

.main{
  flex:1;
  padding:20px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#111827;
  border-radius:12px;
}

input,button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
}

input{
  background:#1f2937;
  color:white;
}

button{
  background:#38bdf8;
  color:white;
  cursor:pointer;
}

.card{
  background:#111827;
  padding:15px;
  margin-top:15px;
  border-radius:12px;
}

.delete{
  color:red;
  cursor:pointer;
}

.edit{
  color:orange;
  cursor:pointer;
  margin-left:10px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>⚡ Dashboard</h2>
</div>

<div class="main">

  <div class="topbar">
    <h3>Welcome 👋 <span id="username"></span></h3>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- SETTINGS -->
  <div class="card">
    <h3>⚙️ Account Settings</h3>

    <input id="oldPass" type="password" placeholder="Old password">
    <input id="newPass" type="password" placeholder="New password">

    <button onclick="changePassword()">Change Password</button>
  </div>

  <!-- ADD -->
  <div class="card">
    <h3>➕ Add Project</h3>

    <input id="user" placeholder="Username">
    <input id="name" placeholder="Project name">
    <input id="link" placeholder="Project link">

    <button onclick="add()">Add</button>
  </div>

  <!-- USERS -->
  <div id="list"></div>

</div>

<script>

/* PROTECT */
if(localStorage.getItem("auth") !== "true"){
  window.location.href = "index.html";
}

/* USER NAME */
document.getElementById("username").innerText =
  localStorage.getItem("user");

/* CHANGE PASSWORD */
function changePassword(){
  let oldP = document.getElementById("oldPass").value;
  let newP = document.getElementById("newPass").value;

  let saved = localStorage.getItem("admin_pass");

  if(oldP !== saved){
    alert("❌ Wrong old password");
    return;
  }

  if(newP.length < 4){
    alert("⚠️ Password too short");
    return;
  }

  localStorage.setItem("admin_pass", newP);

  alert("✅ Password changed!");
}

/* DATA */
function getData(){
  return JSON.parse(localStorage.getItem("projects")) || [];
}

function save(d){
  localStorage.setItem("projects",JSON.stringify(d));
}

/* ADD */
function add(){
  let d = getData();

  let user = document.getElementById("user").value;
  let name = document.getElementById("name").value;
  let link = document.getElementById("link").value;

  if(!user || !name || !link){
    alert("Fill all fields");
    return;
  }

  if(!link.startsWith("http")){
    link = "https://" + link;
  }

  d.push({
    id: Date.now(),
    user,
    name,
    link
  });

  save(d);
  render();
}

/* DELETE */
function del(id){
  let d = getData().filter(x => x.id !== id);
  save(d);
  render();
}

/* EDIT */
function edit(id){
  let d = getData();
  let p = d.find(x => x.id === id);

  let newName = prompt("Edit project name:", p.name);
  if(newName) p.name = newName;

  let newLink = prompt("Edit link:", p.link);
  if(newLink){
    if(!newLink.startsWith("http")){
      newLink = "https://" + newLink;
    }
    p.link = newLink;
  }

  save(d);
  render();
}

/* RENDER */
function render(){
  let d = getData();

  let html = d.map(p => `
    <div class="card">
      <b>${p.user}</b> - ${p.name}<br>
      <a href="${p.link}" target="_blank">${p.link}</a>
      <br><br>
      <span class="delete" onclick="del(${p.id})">delete</span>
      <span class="edit" onclick="edit(${p.id})">edit</span>
    </div>
  `).join("");

  document.getElementById("list").innerHTML = html;
}

render();

/* LOGOUT */
function logout(){
  localStorage.clear();
  window.location.href = "index.html";
}

</script>

</body>
</html>
