<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>projets</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#0a0f1c;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  background: rgba(17,24,39,0.8);
  backdrop-filter: blur(10px);
  padding:20px;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background: rgba(17,24,39,0.6);
  border-radius:12px;
}

/* INPUTS */
input,button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
}

input{
  background:#111827;
  color:white;
}

button{
  background:linear-gradient(45deg,#38bdf8,#0ea5e9);
  color:white;
  cursor:pointer;
}

/* SEARCH */
.search{
  width:100%;
  margin:10px 0;
}

/* STATS */
.stats{
  display:flex;
  gap:10px;
  margin:15px 0;
}

.stat{
  flex:1;
  padding:12px;
  border-radius:12px;
  background: rgba(17,24,39,0.7);
  color:#38bdf8;
}

/* GRID */
.users{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:15px;
}

/* CARD */
.card{
  background: rgba(17,24,39,0.6);
  padding:15px;
  border-radius:15px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:8px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

th{
  color:#38bdf8;
}

a{
  color:#38bdf8;
  text-decoration:none;
}

.delete,.edit{
  cursor:pointer;
}

.delete{color:#ef4444;}
.edit{color:#facc15;}

/* CHART */
canvas{
  background: rgba(17,24,39,0.6);
  border-radius:12px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>⚡ Level 3</h2>
</div>

<div class="main">

  <div class="topbar">
    <h3>📊 SaaS Dashboard</h3>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat">👤 Users: <span id="u">0</span></div>
    <div class="stat">📁 Projects: <span id="p">0</span></div>
  </div>

  <!-- FORM -->
  <div>
    <input id="user" placeholder="Username">
    <input id="name" placeholder="Project name">
    <input id="link" placeholder="Project link">
    <button onclick="add()">Add</button>
  </div>

  <!-- SEARCH -->
  <input class="search" id="search" placeholder="🔍 search..." oninput="render()">

  <!-- CHART -->
  <canvas id="chart" width="400" height="120"></canvas>

  <!-- USERS -->
  <div id="users" class="users"></div>

</div>

<script>

function getData(){
  return JSON.parse(localStorage.getItem("projects")) || [];
}

function save(d){
  localStorage.setItem("projects",JSON.stringify(d));
}

/* ADD */
function add(){
  let d=getData();

  let user=document.getElementById("user").value;
  let name=document.getElementById("name").value;
  let link=document.getElementById("link").value;

  if(!user||!name||!link) return;

  if(!link.startsWith("http")) link="https://"+link;

  d.push({id:Date.now(),user,name,link});
  save(d);
  render();
}

/* DELETE */
function del(id){
  let d=getData().filter(x=>x.id!==id);
  save(d);
  render();
}

/* STATS */
function stats(data){
  document.getElementById("u").innerText =
    new Set(data.map(x=>x.user)).size;

  document.getElementById("p").innerText=data.length;
}

/* CHART */
function drawChart(data){
  let c=document.getElementById("chart");
  let ctx=c.getContext("2d");

  ctx.clearRect(0,0,c.width,c.height);

  let map={};
  data.forEach(x=>{
    map[x.user]=(map[x.user]||0)+1;
  });

  let keys=Object.keys(map);
  let max=Math.max(...Object.values(map),1);

  keys.forEach((k,i)=>{
    let h=(map[k]/max)*100;

    ctx.fillStyle="#38bdf8";
    ctx.fillRect(i*60,110-h,40,h);

    ctx.fillStyle="white";
    ctx.fillText(k,i*60,115);
  });
}

/* RENDER */
function render(){
  let data=getData();
  let q=document.getElementById("search").value?.toLowerCase()||"";

  let f=data.filter(x=>
    x.user.toLowerCase().includes(q) ||
    x.name.toLowerCase().includes(q)
  );

  let box=document.getElementById("users");
  box.innerHTML="";

  let grouped={};
  f.forEach(x=>{
    if(!grouped[x.user]) grouped[x.user]=[];
    grouped[x.user].push(x);
  });

  for(let u in grouped){

    let rows=grouped[u].map(p=>`
      <tr>
        <td>
          ${p.name}
          <div style="font-size:11px;opacity:0.6">${p.link}</div>
        </td>
        <td><a href="${p.link}" target="_blank">open</a></td>
        <td><span class="delete" onclick="del(${p.id})">del</span></td>
      </tr>
    `).join("");

    box.innerHTML+=`
      <div class="card">
        <h3>👤 ${u}</h3>
        <table>
          <tr><th>Project</th><th>Link</th><th></th></tr>
          ${rows}
        </table>
      </div>
    `;
  }

  stats(data);
  drawChart(data);
}

render();

</script>

</body>
</html>
