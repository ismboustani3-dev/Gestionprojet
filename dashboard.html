<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#111827;
}

/* CONTAINER */
.container{
  padding:20px;
}

/* INPUTS */
input{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#111827;
  color:white;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  cursor:pointer;
}

/* SEARCH */
.searchBox{
  margin:10px 0;
}

/* TABLE */
table{
  width:100%;
  margin-top:15px;
  border-collapse:collapse;
  background:#111827;
  border-radius:10px;
  overflow:hidden;
}

th, td{
  padding:12px;
  border-bottom:1px solid #2d3748;
  text-align:left;
}

th{
  background:#1e293b;
  color:#38bdf8;
}

/* BUTTONS */
.edit{
  background:#22c55e;
  border:none;
  padding:5px 8px;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

.del{
  background:#ef4444;
  border:none;
  padding:5px 8px;
  border-radius:6px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<script>
if(!localStorage.getItem("user")){
  window.location.href="index.html";
}
</script>

<!-- TOP -->
<div class="topbar">
  <h3>📊 Dashboard</h3>
  <button onclick="logout()" style="background:#ef4444;">Logout</button>
</div>

<div class="container">

<h3>➕ Add Project</h3>

<input id="user" placeholder="Username">
<input id="name" placeholder="Project name">
<input id="link" placeholder="Project link">
<button onclick="add()">Add</button>

<!-- SEARCH -->
<div class="searchBox">
  🔍 <input id="search" oninput="render()" placeholder="Search by username">
</div>

<!-- TABLE -->
<table>
  <thead>
    <tr>
      <th>Username</th>
      <th>Project</th>
      <th>Link</th>
      <th>Actions</th>
    </tr>
  </thead>

  <tbody id="table"></tbody>
</table>

</div>

<script>

/* DATA */
function getData(){
  return JSON.parse(localStorage.getItem("projects")) || [];
}

function save(data){
  localStorage.setItem("projects", JSON.stringify(data));
}

/* ADD */
function add(){
  let data = getData();

  let user = document.getElementById("user").value;
  let name = document.getElementById("name").value;
  let link = document.getElementById("link").value;

  if(!user || !name || !link){
    return alert("Fill all fields");
  }

  if(!link.startsWith("http")){
    link = "https://" + link;
  }

  data.push({user, name, link});
  save(data);

  document.getElementById("user").value = "";
  document.getElementById("name").value = "";
  document.getElementById("link").value = "";

  render();
}

/* DELETE */
function del(i){
  let data = getData();
  data.splice(i,1);
  save(data);
  render();
}

/* EDIT */
function edit(i){
  let data = getData();

  let u = prompt("Username", data[i].user);
  let n = prompt("Project", data[i].name);
  let l = prompt("Link", data[i].link);

  if(u && n && l){
    if(!l.startsWith("http")){
      l = "https://" + l;
    }

    data[i] = {user:u, name:n, link:l};
    save(data);
    render();
  }
}

/* SEARCH + RENDER */
function render(){
  let data = getData();
  let search = document.getElementById("search").value.toLowerCase();

  let table = document.getElementById("table");
  table.innerHTML = "";

  let filtered = data.filter(p =>
    p.user.toLowerCase().includes(search)
  );

  if(filtered.length === 0){
    table.innerHTML = `<tr><td colspan="4">No data found</td></tr>`;
    return;
  }

  filtered.forEach((p,i)=>{
    table.innerHTML += `
      <tr>
        <td>${p.user}</td>
        <td>${p.name}</td>
        <td><a href="${p.link}" target="_blank">Open</a></td>
        <td>
          <button class="edit" onclick="edit(${i})">Edit</button>
          <button class="del" onclick="del(${i})">Delete</button>
        </td>
      </tr>
    `;
  });
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("user");
  window.location.href="index.html";
}

render();

</script>

</body>
</html>
