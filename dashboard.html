<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard Pro Dynamic</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#0a0f1c;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  background: rgba(17,24,39,0.8);
  backdrop-filter: blur(10px);
  padding:20px;
}

.sidebar h2{ color:#38bdf8; }

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background: rgba(17,24,39,0.6);
  border-radius:12px;
}

/* INPUTS */
input,button{
  padding:12px;
  margin:5px;
  border:none;
  border-radius:10px;
  transition:0.2s;
}

input{
  background:#111827;
  color:white;
}

input:focus{
  box-shadow:0 0 10px #38bdf8;
  transform:scale(1.02);
}

button{
  background:linear-gradient(45deg,#38bdf8,#0ea5e9);
  color:white;
  cursor:pointer;
}

button:hover{
  transform:scale(1.05);
}

/* SEARCH */
#search{
  width:100%;
  margin:10px 0;
}

/* STATS */
.stats{
  display:flex;
  gap:10px;
  margin:15px 0;
}

.stat{
  flex:1;
  padding:12px;
  border-radius:12px;
  background: rgba(17,24,39,0.7);
  color:#38bdf8;
  transition:0.3s;
}

/* GRID */
.users{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:15px;
}

/* CARD */
.card{
  background: rgba(17,24,39,0.6);
  padding:15px;
  border-radius:15px;
  border:1px solid rgba(56,189,248,0.15);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px);
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:8px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

th{ color:#38bdf8; }

a{
  color:#38bdf8;
  text-decoration:none;
}

/* ACTIONS */
.delete{ color:#ef4444; cursor:pointer; margin-left:6px; }
.edit{ color:#facc15; cursor:pointer; margin-left:6px; }

/* TOAST */
#toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#38bdf8;
  color:#0a0f1c;
  padding:10px 15px;
  border-radius:10px;
  display:none;
  font-weight:bold;
  transition:0.3s;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>⚡ Dashboard</h2>
</div>

<div class="main">

  <div class="topbar">
    <h3>📊 Dynamic Dashboard</h3>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat">👤 Users: <span id="totalUsers">0</span></div>
    <div class="stat">📁 Projects: <span id="totalProjects">0</span></div>
  </div>

  <!-- FORM -->
  <div>
    <input id="user" placeholder="Username">
    <input id="name" placeholder="Project name">
    <input id="link" placeholder="Project link">
    <button onclick="add()">Add</button>
  </div>

  <!-- SEARCH -->
  <input id="search" placeholder="🔍 Search..." oninput="render()">

  <!-- USERS -->
  <div id="users" class="users"></div>

</div>

<!-- TOAST -->
<div id="toast"></div>

<script>

/* AUTH */
if(localStorage.getItem("auth") !== "true"){
  location.href="index.html";
}

/* DATA */
function getData(){
  return JSON.parse(localStorage.getItem("projects")) || [];
}

function save(d){
  localStorage.setItem("projects",JSON.stringify(d));
}

/* TOAST */
function showToast(msg){
  let t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";
  t.style.opacity="1";

  setTimeout(()=>{
    t.style.opacity="0";
    setTimeout(()=>t.style.display="none",300);
  },1500);
}

/* ADD */
function add(){
  let d=getData();

  let user=document.getElementById("user").value;
  let name=document.getElementById("name").value;
  let link=document.getElementById("link").value;

  if(!user||!name||!link) return alert("fill all");

  if(!link.startsWith("http")) link="https://"+link;

  d.push({id:Date.now(),user,name,link});
  save(d);

  document.getElementById("user").value="";
  document.getElementById("name").value="";
  document.getElementById("link").value="";

  showToast("✅ Project added!");
  render();
}

/* DELETE PROJECT */
function removeProject(id){
  let d=getData().filter(x=>x.id!==id);
  save(d);
  showToast("🗑 Deleted!");
  render();
}

/* DELETE USER */
function removeUser(user){
  if(!confirm("Delete user " + user + " ?")) return;

  let d=getData().filter(x=>x.user!==user);
  save(d);
  showToast("👤 User deleted!");
  render();
}

/* EDIT */
function editProject(id){
  let d=getData();
  let p=d.find(x=>x.id===id);

  let n=prompt("Edit name:",p.name);
  if(n) p.name=n;

  let l=prompt("Edit link:",p.link);
  if(l){
    if(!l.startsWith("http")) l="https://"+l;
    p.link=l;
  }

  save(d);
  showToast("✏️ Updated!");
  render();
}

/* STATS */
function updateStats(d){
  document.getElementById("totalUsers").innerText =
    new Set(d.map(p=>p.user)).size;

  document.getElementById("totalProjects").innerText =
    d.length;
}

/* RENDER */
function render(){
  let d=getData();

  let q=document.getElementById("search").value?.toLowerCase()||"";

  let f=d.filter(p=>
    p.user.toLowerCase().includes(q) ||
    p.name.toLowerCase().includes(q)
  );

  let box=document.getElementById("users");
  box.innerHTML="";

  let grouped={};

  f.forEach(p=>{
    if(!grouped[p.user]) grouped[p.user]=[];
    grouped[p.user].push(p);
  });

  for(let u in grouped){

    let rows=grouped[u].map(p=>`
      <tr>
        <td>
          ${p.name}
          <div style="font-size:11px;opacity:0.6">${p.link}</div>
        </td>

        <td>
          <a href="${p.link}" target="_blank">open</a>
        </td>

        <td>
          <span class="delete" onclick="removeProject(${p.id})">del</span>
          <span class="edit" onclick="editProject(${p.id})">edit</span>
        </td>
      </tr>
    `).join("");

    box.innerHTML+=`
      <div class="card">

        <div style="display:flex;justify-content:space-between;align-items:center;">
          <h3>👤 ${u}</h3>

          <button onclick="removeUser('${u}')" style="background:#ef4444;padding:6px 10px;border:none;border-radius:8px;color:white;cursor:pointer;">
            Delete User
          </button>
        </div>

        <div style="font-size:12px;opacity:0.6;margin-bottom:8px;">
          📁 ${grouped[u].length} projects
        </div>

        <table>
          <tr><th>Project</th><th>Link</th><th>Action</th></tr>
          ${rows}
        </table>

      </div>
    `;
  }

  updateStats(d);
}

render();

/* LOGOUT */
function logout(){
  localStorage.clear();
  location.href="index.html";
}

</script>

</body>
</html>
