<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:white;
  display:flex;
}

/* Sidebar */
.sidebar{
  width:220px;
  height:100vh;
  background:#111827;
  padding:20px;
}

.sidebar a{
  display:block;
  color:#94a3b8;
  margin:10px 0;
  cursor:pointer;
}

.main{
  flex:1;
  padding:20px;
}

/* Inputs */
input{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#111827;
  color:white;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  cursor:pointer;
}

/* Card */
.card{
  background:#1e293b;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
}

.btn{
  margin-top:10px;
  padding:5px 10px;
  font-size:12px;
}

.del{
  background:#ef4444;
  color:white;
}
</style>
</head>

<body>

<script>
// 🔐 check login
let user = localStorage.getItem("user");
if(!user){
  window.location.href = "index.html";
}
</script>

<div class="sidebar">
  <h3>👤 <span id="username"></span></h3>
  <a onclick="logout()">Logout</a>
</div>

<div class="main">

<h2>My Projects 🚀</h2>

<input id="name" placeholder="Project name">
<input id="link" placeholder="Project link">
<button onclick="addProject()">Add</button>

<div id="list"></div>

</div>

<script>

document.getElementById("username").innerText = user;

/* get user projects */
function getProjects(){
  return JSON.parse(localStorage.getItem("projects_"+user)) || [];
}

/* save */
function saveProjects(data){
  localStorage.setItem("projects_"+user, JSON.stringify(data));
}

/* render */
function render(){
  let projects = getProjects();
  let list = document.getElementById("list");
  list.innerHTML = "";

  projects.forEach((p,i)=>{
    list.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <a href="${p.link}" target="_blank">${p.link}</a><br>

        <button class="btn" onclick="edit(${i})">Edit</button>
        <button class="btn del" onclick="del(${i})">Delete</button>
      </div>
    `;
  });
}

/* add */
function addProject(){
  let projects = getProjects();

  let name = document.getElementById("name").value;
  let link = document.getElementById("link").value;

  if(!name || !link) return alert("Fill fields");

  projects.push({name, link});
  saveProjects(projects);
  render();
}

/* delete */
function del(i){
  let projects = getProjects();
  projects.splice(i,1);
  saveProjects(projects);
  render();
}

/* edit */
function edit(i){
  let projects = getProjects();

  let n = prompt("Name", projects[i].name);
  let l = prompt("Link", projects[i].link);

  if(n && l){
    projects[i] = {name:n, link:l};
    saveProjects(projects);
    render();
  }
}

/* logout */
function logout(){
  localStorage.removeItem("user");
  window.location.href = "index.html";
}

render();

</script>

</body>
</html>
