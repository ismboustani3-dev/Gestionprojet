<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra Admin Pro</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI;
}

body{
  background:#0a0f1c;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  height:100vh;
  background:#0f172a;
  padding:20px;
  position:fixed;
  left:0;
  top:0;
}

.sidebar h2{
  color:#38bdf8;
  margin-bottom:20px;
}

.sidebar button{
  width:100%;
  margin:6px 0;
  padding:10px;
  background:#111827;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.sidebar button:hover{
  background:#1f2937;
}

.topbar{
  position:fixed;
  left:260px;
  right:0;
  height:65px;
  background:#0f172a;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
}

.main{
  margin-left:260px;
  margin-top:65px;
  padding:20px;
  width:100%;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
  background:#0b1220;
  color:white;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:white;
  cursor:pointer;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  text-align:left;
}

.delete{color:#ef4444;cursor:pointer;margin-right:10px;}
.edit{color:#facc15;cursor:pointer;}

/* USER COLUMN LAYOUT */
.usersGrid{
  display:flex;
  gap:20px;
  overflow-x:auto;
  padding-bottom:20px;
}

.userColumn{
  min-width:260px;
  background:#111827;
  padding:15px;
  border-radius:15px;
}

.userColumn h3{
  color:#38bdf8;
  margin-bottom:10px;
}

.projectItem{
  background:#0b1220;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
}

</style>
</head>
<body>

<div class="sidebar">
  <h2>⚡ Ultra Admin</h2>
  <button onclick="show('dashboard')">Dashboard</button>
  <button onclick="show('users')">Users</button>
  <button onclick="show('projects')">Projects</button>
</div>

<div class="topbar">
  <input id="search" placeholder="Search..." oninput="renderProjects()">
  <div>👤 <span id="username"></span></div>
</div>

<div class="main">

  <div id="dashboard" class="card section">
    <h3>Dashboard</h3>
    <p>Users: <span id="uCount"></span></p>
    <p>Projects: <span id="pCount"></span></p>
  </div>

  <div id="users" class="card section">
    <h3>User Management</h3>
    <input id="newUser" placeholder="Add user">
    <button onclick="addUser()">Add</button>
    <table><tbody id="userList"></tbody></table>
  </div>

  <div id="projects" class="section">

    <div class="card">
      <h3>Add Project</h3>
      <input id="user" placeholder="User">
      <input id="name" placeholder="Project">
      <input id="link" placeholder="Link">
      <button onclick="addProject()">Add</button>
    </div>

    <div id="list" class="usersGrid"></div>

  </div>

</div>

<script>

if(!localStorage.getItem("projects")) localStorage.setItem("projects","[]");
if(!localStorage.getItem("users")) localStorage.setItem("users",JSON.stringify(["user1","user2"]));

function getP(){return JSON.parse(localStorage.getItem("projects"));}
function saveP(d){localStorage.setItem("projects",JSON.stringify(d));}

function getU(){return JSON.parse(localStorage.getItem("users"));}
function saveU(d){localStorage.setItem("users",JSON.stringify(d));}

let authUser="admin";
document.getElementById("username").innerText=authUser;

function show(id){
  document.querySelectorAll(".section").forEach(e=>e.style.display="none");
  document.getElementById(id).style.display="block";
}
show('dashboard');

/* USERS */
function addUser(){
  let u=document.getElementById("newUser").value;
  if(!u) return;
  let d=getU();
  if(!d.includes(u)) d.push(u);
  saveU(d);
  renderUsers();
}

function delUser(u){
  saveU(getU().filter(x=>x!==u));
  renderUsers();
}

function renderUsers(){
  let box=document.getElementById("userList");
  box.innerHTML="";
  getU().forEach(u=>{
    box.innerHTML+=`<tr><td>${u}</td><td><span class='delete' onclick="delUser('${u}')">del</span></td></tr>`;
  });
  stats();
}

/* PROJECTS GRID LIKE IMAGE */
function addProject(){
  let d=getP();
  let user=document.getElementById("user").value;
  let name=document.getElementById("name").value;
  let link=document.getElementById("link").value;

  if(!user||!name||!link) return;

  if(!link.startsWith("http")) link="https://"+link;

  d.push({id:Date.now(),user,name,link});
  saveP(d);
  renderProjects();
}

function delProject(id){
  saveP(getP().filter(x=>x.id!==id));
  renderProjects();
}

function renderProjects(){

  let d=getP();
  let q=document.getElementById("search").value?.toLowerCase()||"";

  let filtered=d.filter(p=>
    p.user.toLowerCase().includes(q)||p.name.toLowerCase().includes(q)
  );

  let users=getU();

  let box=document.getElementById("list");
  box.innerHTML="";

  users.forEach(u=>{

    let userProjects=filtered.filter(p=>p.user===u);

    let html="";

    userProjects.forEach(p=>{
      html+=`
        <div class='projectItem'>
          <b>${p.name}</b><br>
          <a href='${p.link}' target='_blank'>open</a><br>
          <span class='delete' onclick='delProject(${p.id})'>delete</span>
        </div>
      `;
    });

    box.innerHTML+=`
      <div class='userColumn'>
        <h3>${u}</h3>
        ${html || '<small>No projects</small>'}
      </div>
    `;

  });

  stats();
}

function stats(){
  let d=getP();
  let u=new Set(d.map(x=>x.user));
  document.getElementById("uCount").innerText=u.size;
  document.getElementById("pCount").innerText=d.length;
}

function render(){renderProjects();}

renderUsers();
renderProjects();

</script>

</body>
</html>
