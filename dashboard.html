<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra Admin Pro</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI;
}

body{
  background:#0a0f1c;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  height:100vh;
  background:#0f172a;
  padding:20px;
  position:fixed;
  left:0;
  top:0;
}

.sidebar h2{
  color:#38bdf8;
  margin-bottom:20px;
}

.sidebar button{
  width:100%;
  margin:5px 0;
  padding:10px;
  background:#111827;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.sidebar button:hover{
  background:#1f2937;
}

/* TOPBAR */
.topbar{
  position:fixed;
  left:260px;
  right:0;
  height:65px;
  background:#0f172a;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
}

/* MAIN */
.main{
  margin-left:260px;
  margin-top:65px;
  padding:20px;
  width:100%;
}

#search{
  padding:10px;
  border-radius:10px;
  border:none;
  background:#111827;
  color:white;
  width:220px;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  margin-bottom:20px;
}

.stat{
  background:#111827;
  padding:20px;
  border-radius:15px;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
  background:#0b1220;
  color:white;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:white;
  cursor:pointer;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  text-align:left;
}

.delete{color:#ef4444;cursor:pointer;margin-right:10px;}
.edit{color:#facc15;cursor:pointer;}

.section{display:none;}
.active{display:block;}
</style>
</head>
<body>

<div class="sidebar">
  <h2>⚡ Ultra Admin</h2>
  <button onclick="showSection('dashboard')">Dashboard</button>
  <button onclick="showSection('users')">User Management</button>
  <button onclick="showSection('projects')">Projects</button>
</div>

<div class="topbar">
  <input id="search" placeholder="Search..." oninput="render()">
  <div>👤 <span id="username"></span></div>
</div>

<div class="main">

  <!-- DASHBOARD -->
  <div id="dashboard" class="section active">
    <div class="stats">
      <div class="stat">👤 Users: <span id="totalUsers">0</span></div>
      <div class="stat">📁 Projects: <span id="totalProjects">0</span></div>
    </div>
  </div>

  <!-- USERS -->
  <div id="users" class="section">
    <div class="card">
      <h3>User Management</h3>
      <input id="newUser" placeholder="New user name">
      <button onclick="addUser()">Add User</button>
      <table>
        <thead>
          <tr><th>User</th><th>Action</th></tr>
        </thead>
        <tbody id="userList"></tbody>
      </table>
    </div>
  </div>

  <!-- PROJECTS -->
  <div id="projects" class="section">
    <div class="card">
      <h3>Add Project</h3>
      <input id="user" placeholder="User">
      <input id="name" placeholder="Project name">
      <input id="link" placeholder="Project link">
      <button onclick="addProject()">Add</button>
    </div>

    <div id="list"></div>
  </div>

</div>

<script>

if(!localStorage.getItem("projects")) localStorage.setItem("projects","[]");
if(!localStorage.getItem("users")) localStorage.setItem("users",JSON.stringify(["admin"]));

function getProjects(){return JSON.parse(localStorage.getItem("projects"));}
function saveProjects(d){localStorage.setItem("projects",JSON.stringify(d));}

function getUsers(){return JSON.parse(localStorage.getItem("users"));}
function saveUsers(d){localStorage.setItem("users",JSON.stringify(d));}

function showSection(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

document.getElementById("username").innerText="admin";

/* USERS */
function addUser(){
  let u=document.getElementById("newUser").value;
  if(!u) return;
  let users=getUsers();
  if(!users.includes(u)) users.push(u);
  saveUsers(users);
  renderUsers();
}

function deleteUser(u){
  saveUsers(getUsers().filter(x=>x!==u));
  renderUsers();
}

function renderUsers(){
  let box=document.getElementById("userList");
  box.innerHTML="";
  getUsers().forEach(u=>{
    box.innerHTML+=`<tr><td>${u}</td><td><span class='delete' onclick="deleteUser('${u}')">del</span></td></tr>`;
  });
  updateStats();
}

/* PROJECTS */
function addProject(){
  let d=getProjects();
  let user=document.getElementById("user").value;
  let name=document.getElementById("name").value;
  let link=document.getElementById("link").value;

  if(!user||!name||!link) return;

  if(!link.startsWith("http")) link="https://"+link;

  d.push({id:Date.now(),user,name,link});
  saveProjects(d);
  renderProjects();
}

function deleteProject(id){
  saveProjects(getProjects().filter(x=>x.id!==id));
  renderProjects();
}

function renderProjects(){
  let d=getProjects();
  let q=document.getElementById("search").value?.toLowerCase()||"";

  let filtered=d.filter(p=>p.user.toLowerCase().includes(q)||p.name.toLowerCase().includes(q));

  let box=document.getElementById("list");
  box.innerHTML="";

  let grouped={};
  filtered.forEach(p=>{
    if(!grouped[p.user]) grouped[p.user]=[];
    grouped[p.user].push(p);
  });

  Object.keys(grouped).forEach(u=>{
    let rows=grouped[u].map(p=>`
      <tr>
        <td>${p.name}</td>
        <td><a href='${p.link}' target='_blank'>link</a></td>
        <td><span class='delete' onclick='deleteProject(${p.id})'>del</span></td>
      </tr>
    `).join("");

    box.innerHTML+=`<div class='card'><h3>${u}</h3><table>${rows}</table></div>`;
  });

  updateStats();
}

function updateStats(){
  let p=getProjects();
  let u=new Set(p.map(x=>x.user));

  document.getElementById("totalUsers").innerText=u.size;
  document.getElementById("totalProjects").innerText=p.length;
}

function render(){renderProjects();}

renderUsers();
renderProjects();

</script>
</body>
</html>
