<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra Pro Admin Dashboard</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: radial-gradient(circle at top,#0a0f1c,#050814);
  color:white;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:240px;
  height:100vh;
  background: rgba(17,24,39,0.65);
  backdrop-filter: blur(15px);
  padding:20px;
  border-right:1px solid rgba(255,255,255,0.08);
}

.sidebar h2{ color:#38bdf8; }

/* TOPBAR */
.topbar{
  position:fixed;
  top:0;
  left:240px;
  right:0;
  height:60px;
  background: rgba(17,24,39,0.5);
  backdrop-filter: blur(15px);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
}

/* MENU */
#menu{
  position:absolute;
  top:50px;
  right:20px;
  background:#111827;
  padding:10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);
  display:none;
}

#menu button{
  width:120px;
  margin:5px 0;
}

/* MAIN */
.main{
  margin-left:240px;
  margin-top:60px;
  padding:20px;
}

/* STATS */
.stats{
  display:flex;
  gap:15px;
}

.stat{
  flex:1;
  background: rgba(17,24,39,0.6);
  padding:18px;
  border-radius:15px;
  text-align:center;
}

/* CARD */
.card{
  background: rgba(17,24,39,0.6);
  padding:15px;
  border-radius:15px;
  margin-top:15px;
}

/* INPUT */
input,button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
}

input{
  background:#111827;
  color:white;
}

button{
  background:linear-gradient(45deg,#38bdf8,#0ea5e9);
  color:white;
  cursor:pointer;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

th{ color:#38bdf8; text-align:left; padding:8px; }
td{ padding:8px; border-bottom:1px solid #222; }

span{ cursor:pointer; margin:0 5px; }

</style>
</head>

<body>

<div class="sidebar">
  <h2>⚡ Ultra Admin</h2>
</div>

<div class="topbar">
  <input id="search" placeholder="Search..." oninput="render()">

  <div style="position:relative;">
    👤 <span id="username"></span>
    <button onclick="toggleMenu()">⚙️</button>

    <div id="menu">
      <button onclick="settings()">Settings</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>
</div>

<div class="main">

  <div class="stats">
    <div class="stat">📁 Projects<br><span id="totalProjects">0</span></div>
  </div>

  <div class="card">
    <h3>Add Project</h3>
    <input id="name" placeholder="Project name">
    <input id="link" placeholder="Project link">
    <button onclick="add()">Add</button>
  </div>

  <div id="list"></div>

</div>

<script>

/* DB SYSTEM */
function getDB(){
  return JSON.parse(localStorage.getItem("db")) || {
    users: [],
    currentUser: null
  };
}

function saveDB(db){
  localStorage.setItem("db", JSON.stringify(db));
}

/* INIT USERS */
(function(){
  let db = getDB();

  if(db.users.length === 0){
    db.users = [
      {username:"user1", password:"1234", projects:[]},
      {username:"user2", password:"1234", projects:[]}
    ];
    db.currentUser = "user1";
    saveDB(db);
  }
})();

/* CHECK LOGIN */
let db = getDB();
if(!db.currentUser){
  location.href="index.html";
}

function getUser(){
  let db = getDB();
  return db.users.find(u => u.username === db.currentUser);
}

/* UI */
document.getElementById("username").innerText = db.currentUser;

/* MENU */
function toggleMenu(){
  let m = document.getElementById("menu");
  m.style.display = m.style.display==="block"?"none":"block";
}

/* SETTINGS (USERNAME + PASSWORD) */
function settings(){
  let db = getDB();
  let u = getUser();

  let newU = prompt("Username", u.username);
  let newP = prompt("Password", u.password);

  if(newU) u.username = newU;
  if(newP) u.password = newP;

  db.currentUser = u.username;

  saveDB(db);
  document.getElementById("username").innerText = u.username;
  document.getElementById("menu").style.display="none";
}

/* LOGOUT */
function logout(){
  let db = getDB();
  db.currentUser = null;
  saveDB(db);
  location.href="index.html";
}

/* ADD PROJECT */
function add(){
  let db = getDB();
  let u = getUser();

  let name = document.getElementById("name").value;
  let link = document.getElementById("link").value;

  if(!name || !link) return alert("Fill all");

  if(!link.startsWith("http")) link="https://"+link;

  u.projects.push({
    id:Date.now(),
    name,
    link
  });

  saveDB(db);
  render();
}

/* DELETE */
function del(id){
  let db = getDB();
  let u = getUser();

  u.projects = u.projects.filter(p=>p.id!==id);

  saveDB(db);
  render();
}

/* EDIT */
function edit(id){
  let db = getDB();
  let u = getUser();

  let p = u.projects.find(x=>x.id===id);

  let n = prompt("Name", p.name);
  let l = prompt("Link", p.link);

  if(n) p.name=n;
  if(l){
    if(!l.startsWith("http")) l="https://"+l;
    p.link=l;
  }

  saveDB(db);
  render();
}

/* RENDER */
function render(){
  let u = getUser();

  let q = document.getElementById("search").value?.toLowerCase()||"";

  let list = u.projects.filter(p=>p.name.toLowerCase().includes(q));

  document.getElementById("totalProjects").innerText = u.projects.length;

  let box = document.getElementById("list");
  box.innerHTML = "";

  let rows = list.map(p=>`
    <tr>
      <td>${p.name}</td>
      <td><a href="${p.link}" target="_blank"><button>OPEN</button></a></td>
      <td>
        <span onclick="del(${p.id})">del</span>
        <span onclick="edit(${p.id})">edit</span>
      </td>
    </tr>
  `).join("");

  box.innerHTML = `
    <div class="card">
      <h3>User: ${u.username}</h3>
      <table>
        <tr><th>Project</th><th>Link</th><th>Action</th></tr>
        ${rows}
      </table>
    </div>
  `;
}

render();

</script>

</body>
</html>
