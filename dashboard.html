<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra Admin Pro</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI;
}

body{
  background:#0a0f1c;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  height:100vh;
  background:#0f172a;
  padding:20px;
  position:fixed;
  left:0;
  top:0;
}

.sidebar h2{
  color:#38bdf8;
  margin-bottom:20px;
}

/* TOPBAR */
.topbar{
  position:fixed;
  left:260px;
  right:0;
  height:65px;
  background:#0f172a;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
}

/* MAIN */
.main{
  margin-left:260px;
  margin-top:65px;
  padding:20px;
  width:100%;
}

/* SEARCH */
#search{
  padding:10px;
  border-radius:10px;
  border:none;
  background:#111827;
  color:white;
  width:220px;
}

/* ADMIN MENU */
#adminMenu{
  display:none;
  position:absolute;
  right:0;
  top:45px;
  background:#111827;
  border-radius:10px;
  overflow:hidden;
  width:150px;
}

#adminMenu button{
  width:100%;
  padding:10px;
  border:none;
  cursor:pointer;
  background:#111827;
  color:white;
}

#adminMenu button:hover{
  background:#1f2937;
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  margin-bottom:20px;
}

.stat{
  background:#111827;
  padding:20px;
  border-radius:15px;
}

/* CARD */
.card{
  background:#111827;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

/* INPUTS */
input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
  background:#0b1220;
  color:white;
}

/* BUTTON */
button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:white;
  cursor:pointer;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th{
  text-align:left;
  padding:10px;
  color:#38bdf8;
}

td{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

/* ACTION */
.delete{color:#ef4444;cursor:pointer;margin-right:10px;}
.edit{color:#facc15;cursor:pointer;}

a{
  color:#38bdf8;
  word-break:break-all;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>⚡ Ultra Admin</h2>
</div>

<!-- TOPBAR -->
<div class="topbar">

  <input id="search" placeholder="Search..." oninput="render()">

  <div style="position:relative;">
    👤 <span id="username"></span>
    <button onclick="toggleMenu()">⚙</button>

    <div id="adminMenu">
      <button onclick="settings()">Settings</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

</div>

<!-- MAIN -->
<div class="main">

  <!-- STATS -->
  <div class="stats">
    <div class="stat">👤 Users: <span id="totalUsers">0</span></div>
    <div class="stat">📁 Projects: <span id="totalProjects">0</span></div>
  </div>

  <!-- ADD -->
  <div class="card">
    <h3>Add Project</h3>
    <input id="user" placeholder="User name">
    <input id="name" placeholder="Project name">
    <input id="link" placeholder="Project link">
    <button onclick="add()">Add</button>
  </div>

  <div id="list"></div>

</div>

<script>

/* PASSWORD */
if(!localStorage.getItem("admin_pass")){
  localStorage.setItem("admin_pass","1234");
}

/* AUTH */
if(localStorage.getItem("auth")!=="true"){
  location.href="index.html";
}

document.getElementById("username").innerText=
localStorage.getItem("user");

/* MENU */
function toggleMenu(){
  let m=document.getElementById("adminMenu");
  m.style.display=m.style.display==="block"?"none":"block";
}

/* SETTINGS */
function settings(){
  let old=prompt("Enter password");
  if(old!==localStorage.getItem("admin_pass")){
    alert("Wrong password");
    return;
  }

  let np=prompt("New password");
  if(np){
    localStorage.setItem("admin_pass",np);
    alert("Updated");
  }
}

/* LOGOUT */
function logout(){
  localStorage.clear();
  location.href="index.html";
}

/* DATA */
function getData(){
  return JSON.parse(localStorage.getItem("projects"))||[];
}

function save(d){
  localStorage.setItem("projects",JSON.stringify(d));
}

/* ADD */
function add(){
  let d=getData();

  let user=user.value;
  let name=name.value;
  let link=link.value;

  if(!user||!name||!link)return;

  if(!link.startsWith("http")){
    link="https://"+link;
  }

  d.push({
    id:Date.now(),
    user,
    name,
    link
  });

  save(d);
  render();
}

/* DELETE */
function delProject(id){
  save(getData().filter(x=>x.id!==id));
  render();
}

/* EDIT */
function editProject(id){
  let d=getData();
  let p=d.find(x=>x.id===id);

  let n=prompt("Name",p.name);
  let l=prompt("Link",p.link);

  if(n)p.name=n;
  if(l)p.link=l;

  save(d);
  render();
}

/* COPY */
function copyLink(l){
  navigator.clipboard.writeText(l);
}

/* STATS */
function updateStats(d){
  document.getElementById("totalUsers").innerText=
  new Set(d.map(x=>x.user)).size;

  document.getElementById("totalProjects").innerText=
  d.length;
}

/* RENDER (PARALLEL USERS SYSTEM) */
function render(){

  let d=getData();
  let q=search.value?.toLowerCase()||"";

  let filtered=d.filter(p=>
    p.user.toLowerCase().includes(q)||
    p.name.toLowerCase().includes(q)
  );

  updateStats(filtered);

  let box=document.getElementById("list");
  box.innerHTML="";

  let users={};

  filtered.forEach(p=>{
    if(!users[p.user]) users[p.user]=[];
    users[p.user].push(p);
  });

  Object.keys(users).forEach(u=>{

    let rows=users[u].map(p=>`
      <tr>
        <td>${p.name}</td>
        <td>
          <a href="${p.link}" target="_blank">${p.link}</a>
          <br>
          <button onclick="copyLink('${p.link}')">copy</button>
        </td>
        <td>
          <span class="delete" onclick="delProject(${p.id})">del</span>
          <span class="edit" onclick="editProject(${p.id})">edit</span>
        </td>
      </tr>
    `).join("");

    box.innerHTML+=`
      <div class="card">
        <h3>👤 ${u}</h3>
        <table>
          <tr>
            <th>Project</th>
            <th>Link</th>
            <th>Action</th>
          </tr>
          ${rows}
        </table>
      </div>
    `;
  });
}

render();

</script>

</body>
</html>
