<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Projects Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:white;
  display:flex;
}

/* sidebar */
.sidebar{
  width:220px;
  height:100vh;
  background:#111827;
  padding:20px;
}

select{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
}

/* main */
.main{
  flex:1;
  padding:20px;
}

/* inputs */
input{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#111827;
  color:white;
}

/* button */
button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  cursor:pointer;
}

/* stats */
.stats{
  display:flex;
  gap:15px;
  margin-bottom:20px;
}

.stat{
  flex:1;
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  text-align:center;
}

/* card */
.card{
  background:#1e293b;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
}

/* btn */
.btn{
  margin-top:10px;
  padding:5px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.del{
  background:#ef4444;
  color:white;
}

.edit{
  background:#22c55e;
}
</style>
</head>

<body>

<script>
if(!localStorage.getItem("user")){
  window.location.href="index.html";
}
</script>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>👤 Users</h3>
  <select id="filter" onchange="render()">
    <option value="all">All Users</option>
  </select>
</div>

<!-- MAIN -->
<div class="main">

<h2>📊 Dashboard</h2>

<!-- STATS -->
<div class="stats">
  <div class="stat">
    <h2 id="totalProjects">0</h2>
    <p>Projects</p>
  </div>

  <div class="stat">
    <h2 id="totalUsers">0</h2>
    <p>Users</p>
  </div>
</div>

<!-- ADD -->
<h3>➕ Add Project</h3>

<input id="name" placeholder="Project name">
<input id="link" placeholder="Project link">
<input id="user" placeholder="User name">

<button onclick="add()">Add</button>

<!-- LIST -->
<div id="list"></div>

</div>

<script>

/* DATA */
function getData(){
  return JSON.parse(localStorage.getItem("projects")) || [];
}

function save(data){
  localStorage.setItem("projects", JSON.stringify(data));
}

/* USERS */
function getUsers(data){
  return [...new Set(data.map(p => p.user))];
}

/* GLOBAL */
let filteredData = [];

/* RENDER */
function render(){
  let data = getData();
  let filter = document.getElementById("filter").value;

  let list = document.getElementById("list");
  list.innerHTML = "";

  filteredData = filter === "all"
    ? data
    : data.filter(p => p.user === filter);

  filteredData.forEach((p,i)=>{
    list.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>👤 ${p.user}</p>
        <a href="${p.link}" target="_blank">${p.link}</a><br>

        <button class="btn edit" onclick="edit(${i})">Edit</button>
        <button class="btn del" onclick="del(${i})">Delete</button>
      </div>
    `;
  });

  document.getElementById("totalProjects").innerText = data.length;
  document.getElementById("totalUsers").innerText = getUsers(data).length;

  updateFilter(data);
}

/* FILTER */
function updateFilter(data){
  let users = getUsers(data);
  let select = document.getElementById("filter");

  select.innerHTML = `<option value="all">All Users</option>`;

  users.forEach(u=>{
    select.innerHTML += `<option value="${u}">${u}</option>`;
  });
}

/* ADD (FIX LINK BUG HERE) */
function add(){
  let data = getData();

  let name = document.getElementById("name").value;
  let link = document.getElementById("link").value;
  let user = document.getElementById("user").value;

  if(!name || !link || !user) return alert("Fill all fields");

  // 🔥 FIX LINK
  if(!link.startsWith("http")){
    link = "https://" + link;
  }

  data.push({name, link, user});
  save(data);
  render();
}

/* DELETE */
function del(i){
  let data = getData();

  let item = filteredData[i];

  let index = data.findIndex(p =>
    p.name === item.name &&
    p.link === item.link &&
    p.user === item.user
  );

  data.splice(index,1);
  save(data);
  render();
}

/* EDIT */
function edit(i){
  let data = getData();

  let item = filteredData[i];

  let index = data.findIndex(p =>
    p.name === item.name &&
    p.link === item.link &&
    p.user === item.user
  );

  let n = prompt("Name", data[index].name);
  let l = prompt("Link", data[index].link);
  let u = prompt("User", data[index].user);

  if(n && l && u){
    if(!l.startsWith("http")){
      l = "https://" + l;
    }

    data[index] = {name:n, link:l, user:u};
    save(data);
    render();
  }
}

render();

</script>

</body>
</html>
