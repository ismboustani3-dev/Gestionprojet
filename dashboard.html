<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Firebase Admin Pro</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#0b1220;
  color:white;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  width:220px;
  height:100vh;
  background:#111827;
  padding:15px;
}

.container{
  margin-left:220px;
  padding:20px;
}

/* CARD */
.card{
  background:#111827;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

/* INPUT */
input{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#1f2937;
  color:white;
}

/* BUTTON */
button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#38bdf8;
  color:white;
}

.danger{background:#ef4444;}
.edit{background:#facc15;}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

th{
  text-align:left;
  color:#38bdf8;
  padding:10px;
}

td{
  padding:10px;
  border-bottom:1px solid #1f2937;
}

/* LINK */
a{
  color:#38bdf8;
  word-break:break-all;
}

</style>
</head>

<body>

<div class="sidebar">
  <h2>⚡ ADMIN</h2>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">

<h2>🔥 Firebase Admin Dashboard</h2>

<!-- LOGIN -->
<div id="loginBox" class="card">
  <h3>Login</h3>
  <input id="email" placeholder="email">
  <input id="pass" type="password" placeholder="password">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dash" style="display:none;">

<!-- ADD PROJECT -->
<div class="card">
  <h3>Add Project</h3>
  <input id="user" placeholder="User ID">
  <input id="name" placeholder="Project name">
  <input id="link" placeholder="Link">
  <button onclick="addProject()">Add</button>
</div>

<!-- DATA -->
<div id="list"></div>

</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

<script>

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* LOGIN */
function login(){
  let e=email.value;
  let p=pass.value;

  auth.signInWithEmailAndPassword(e,p)
  .then(()=>{
    loginBox.style.display="none";
    dash.style.display="block";
    loadData();
  })
  .catch(err=>alert(err.message));
}

/* LOGOUT */
function logout(){
  auth.signOut();
  location.reload();
}

/* ADD PROJECT */
function addProject(){
  db.collection("projects").add({
    user:user.value,
    name:name.value,
    link:link.value.startsWith("http")?link.value:"https://"+link.value,
    created:Date.now()
  });
}

/* DELETE */
function del(id){
  db.collection("projects").doc(id).delete();
}

/* EDIT */
function edit(id,oldName){
  let n=prompt("New name",oldName);
  if(n){
    db.collection("projects").doc(id).update({
      name:n
    });
  }
}

/* REAL TIME LOAD */
function loadData(){

db.collection("projects").onSnapshot(snap=>{

  let box=document.getElementById("list");
  box.innerHTML="";

  let users={};

  snap.forEach(doc=>{
    let d=doc.data();
    let id=doc.id;

    if(!users[d.user]) users[d.user]=[];
    users[d.user].push({...d,id});
  });

  for(let u in users){

    let rows=users[u].map(p=>`
      <tr>
        <td>${p.name}</td>
        <td><a href="${p.link}" target="_blank">${p.link}</a></td>
        <td>
          <button class="edit" onclick="edit('${p.id}','${p.name}')">Edit</button>
          <button class="danger" onclick="del('${p.id}')">Del</button>
        </td>
      </tr>
    `).join("");

    box.innerHTML+=`
      <div class="card">
        <h3>👤 ${u}</h3>

        <table>
          <tr>
            <th>Project</th>
            <th>Link</th>
            <th>Action</th>
          </tr>
          ${rows}
        </table>
      </div>
    `;
  }

});

}

</script>

</body>
</html>
