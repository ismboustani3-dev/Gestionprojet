<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Dashboard</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#0a0f1c;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  background: rgba(17,24,39,0.8);
  backdrop-filter: blur(10px);
  padding:20px;
  border-right:1px solid rgba(255,255,255,0.05);
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background: rgba(17,24,39,0.6);
  border-radius:12px;
  backdrop-filter: blur(10px);
}

/* STATS */
.stats{
  display:flex;
  gap:10px;
  margin-top:15px;
  flex-wrap:wrap;
}

.stat{
  flex:1;
  min-width:160px;
  padding:12px;
  border-radius:12px;
  background: rgba(17,24,39,0.7);
  border:1px solid rgba(56,189,248,0.15);
  color:#38bdf8;
}

/* INPUTS */
input,button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
}

input{
  background:#111827;
  color:white;
  outline:none;
}

button{
  background:linear-gradient(45deg,#38bdf8,#0ea5e9);
  color:white;
  cursor:pointer;
}

/* SEARCH */
.search{
  width:100%;
  margin:10px 0;
}

/* GRID */
.users{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:15px;
  margin-top:15px;
}

/* CARD */
.card{
  background: rgba(17,24,39,0.6);
  padding:15px;
  border-radius:15px;
  border:1px solid rgba(56,189,248,0.15);
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:8px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

th{
  color:#38bdf8;
}

.delete{
  color:#ef4444;
  cursor:pointer;
}

.edit{
  color:#facc15;
  cursor:pointer;
  margin-left:8px;
}

canvas{
  background: rgba(17,24,39,0.6);
  border-radius:12px;
  margin-top:15px;
  padding:10px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>⚡ Ultimate</h2>
  <p>Dashboard Pro</p>
</div>

<div class="main">

  <div class="topbar">
    <h3>📊 Dashboard</h3>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat">👤 Users: <span id="u">0</span></div>
    <div class="stat">📁 Projects: <span id="p">0</span></div>
  </div>

  <!-- FORM -->
  <div>
    <input id="user" placeholder="Username">
    <input id="name" placeholder="Project name">
    <input id="link" placeholder="Project link">
    <button onclick="add()">Add</button>
  </div>

  <!-- SEARCH -->
  <input class="search" id="search" placeholder="🔍 Search user or project..." oninput="render()">

  <!-- CHART -->
  <canvas id="chart" width="400" height="150"></canvas>

  <!-- USERS -->
  <div id="users" class="users"></div>

</div>

<script>

if(localStorage.getItem("auth") !== "true"){
  window.location.href="index.html";
}

function getData(){
  return JSON.parse(localStorage.getItem("projects")) || [];
}

function save(d){
  localStorage.setItem("projects",JSON.stringify(d));
}

/* ADD */
function add(){
  let d = getData();

  let user=document.getElementById("user").value;
  let name=document.getElementById("name").value;
  let link=document.getElementById("link").value;

  if(!user||!name||!link) return alert("fill all");

  if(!link.startsWith("http")) link="https://"+link;

  d.push({id:Date.now(),user,name,link});
  save(d);
  render();
}

/* DELETE */
function del(id){
  let d=getData().filter(x=>x.id!==id);
  save(d);
  render();
}

/* EDIT */
function edit(id){
  let d=getData();
  let p=d.find(x=>x.id===id);

  let newName=prompt("new name",p.name);
  if(newName) p.name=newName;

  save(d);
  render();
}

/* LOGOUT */
function logout(){
  localStorage.clear();
  location.href="index.html";
}

/* STATS */
function stats(data){
  let users=new Set(data.map(x=>x.user)).size;
  document.getElementById("u").innerText=users;
  document.getElementById("p").innerText=data.length;
}

/* CHART */
function drawChart(data){
  let c=document.getElementById("chart");
  let ctx=c.getContext("2d");

  ctx.clearRect(0,0,c.width,c.height);

  let grouped={};
  data.forEach(x=>{
    grouped[x.user]=(grouped[x.user]||0)+1;
  });

  let keys=Object.keys(grouped);
  let max=Math.max(...Object.values(grouped),1);

  keys.forEach((k,i)=>{
    let h=(grouped[k]/max)*120;

    ctx.fillStyle="#38bdf8";
    ctx.fillRect(i*60,140-h,40,h);

    ctx.fillStyle="white";
    ctx.fillText(k, i*60,145);
  });
}

/* RENDER */
function render(){
  let data=getData();
  let q=document.getElementById("search").value?.toLowerCase()||"";

  let filtered=data.filter(x=>
    x.user.toLowerCase().includes(q) ||
    x.name.toLowerCase().includes(q)
  );

  let box=document.getElementById("users");
  box.innerHTML="";

  if(filtered.length===0){
    box.innerHTML="<p>No data</p>";
    stats(data);
    drawChart(data);
    return;
  }

  let grouped={};
  filtered.forEach(x=>{
    if(!grouped[x.user]) grouped[x.user]=[];
    grouped[x.user].push(x);
  });

  for(let u in grouped){

    let rows=grouped[u].map(p=>`
      <tr>
        <td>${p.name}</td>
        <td><a href="${p.link}" target="_blank">open</a></td>
        <td>
          <span class="delete" onclick="del(${p.id})">del</span>
          <span class="edit" onclick="edit(${p.id})">edit</span>
        </td>
      </tr>
    `).join("");

    box.innerHTML+=`
      <div class="card">
        <h3>👤 ${u}</h3>
        <p>📁 ${grouped[u].length} projects</p>
        <table>
          <tr><th>name</th><th>link</th><th></th></tr>
          ${rows}
        </table>
      </div>
    `;
  }

  stats(data);
  drawChart(data);
}

render();

</script>

</body>
</html>
