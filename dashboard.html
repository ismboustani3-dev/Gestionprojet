<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#0a0f1c;
  color:white;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:220px;
  height:100vh;
  background:#111827;
  padding:20px;
}

.sidebar h2{ color:#38bdf8; }

/* TOPBAR */
.topbar{
  position:fixed;
  top:0;
  left:220px;
  right:0;
  height:60px;
  background:#111827;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  padding:0 20px;
}

/* MAIN */
.main{
  margin-left:220px;
  margin-top:60px;
  padding:20px;
}

/* STATS */
.stats{
  display:flex;
  gap:15px;
}

.stat{
  flex:1;
  background:#111827;
  padding:15px;
  border-radius:12px;
  text-align:center;
  color:#38bdf8;
}

/* GRID */
#list{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
  gap:15px;
}

/* CARD */
.card{
  background:#111827;
  padding:15px;
  border-radius:12px;
}

/* TABLE */
table{
  width:100%;
  margin-top:10px;
  border-collapse:collapse;
}

th{
  text-align:left;
  padding:8px;
  color:#38bdf8;
}

td{
  padding:8px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* INPUT */
input,button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
}

input{
  background:#1f2937;
  color:white;
}

button{
  background:#38bdf8;
  color:white;
  cursor:pointer;
}

/* ACTION */
.delete{ color:red; cursor:pointer; }
.edit{ color:orange; cursor:pointer; margin-left:10px; }
</style>
</head>

<body>

<div class="sidebar">
  <h2>⚡ Admin Panel</h2>
</div>

<div class="topbar">
  👤 <span id="username"></span>
</div>

<div class="main">

  <!-- STATS -->
  <div class="stats">
    <div class="stat">👤 Users<br><span id="totalUsers">0</span></div>
    <div class="stat">📁 Projects<br><span id="totalProjects">0</span></div>
  </div>

  <!-- ADD -->
  <div class="card">
    <h3>➕ Add Project</h3>

    <input id="user" placeholder="Username">
    <input id="name" placeholder="Project name">
    <input id="link" placeholder="Project link">

    <button onclick="add()">Add</button>
  </div>

  <!-- LIST -->
  <div id="list"></div>

</div>

<script>

/* AUTH */
if(localStorage.getItem("auth") !== "true"){
  location.href="index.html";
}

/* USER */
document.getElementById("username").innerText =
  localStorage.getItem("user");

/* DATA */
function getData(){
  return JSON.parse(localStorage.getItem("projects")) || [];
}

function save(d){
  localStorage.setItem("projects", JSON.stringify(d));
}

/* ADD */
function add(){
  let d = getData();

  let user = document.getElementById("user").value;
  let name = document.getElementById("name").value;
  let link = document.getElementById("link").value;

  if(!user || !name || !link){
    alert("Fill all");
    return;
  }

  if(!link.startsWith("http")){
    link = "https://" + link;
  }

  d.push({
    id:Date.now(),
    user,
    name,
    link
  });

  save(d);
  render();
}

/* DELETE PROJECT */
function delProject(id){
  let d = getData().filter(x => x.id !== id);
  save(d);
  render();
}

/* EDIT PROJECT */
function editProject(id){
  let d = getData();
  let p = d.find(x => x.id === id);

  let n = prompt("Edit project name", p.name);
  if(n) p.name = n;

  let l = prompt("Edit link", p.link);
  if(l){
    if(!l.startsWith("http")) l="https://"+l;
    p.link = l;
  }

  save(d);
  render();
}

/* DELETE USER */
function deleteUser(user){
  if(!confirm("Delete user " + user + " ?")) return;

  let d = getData().filter(x => x.user !== user);
  save(d);
  render();
}

/* EDIT USER */
function editUser(oldUser){
  let newUser = prompt("Edit username:", oldUser);
  if(!newUser) return;

  let d = getData().map(p=>{
    if(p.user === oldUser){
      return {...p, user:newUser};
    }
    return p;
  });

  save(d);
  render();
}

/* STATS */
function updateStats(d){
  let users = new Set(d.map(p => p.user));
  document.getElementById("totalUsers").innerText = users.size;
  document.getElementById("totalProjects").innerText = d.length;
}

/* RENDER */
function render(){
  let d = getData();
  updateStats(d);

  let box = document.getElementById("list");
  box.innerHTML = "";

  let grouped = {};

  d.forEach(p=>{
    if(!grouped[p.user]) grouped[p.user] = [];
    grouped[p.user].push(p);
  });

  for(let u in grouped){

    let rows = grouped[u].map(p=>`
      <tr>
        <td>${p.name}</td>

        <td>
          <a href="${p.link}" target="_blank">
            <button>OPEN</button>
          </a>
        </td>

        <td>
          <span class="delete" onclick="delProject(${p.id})">del</span>
          <span class="edit" onclick="editProject(${p.id})">edit</span>
        </td>
      </tr>
    `).join("");

    box.innerHTML += `
      <div class="card">

        <div style="display:flex;justify-content:space-between;align-items:center;">
          <h3>👤 ${u}</h3>

          <div>
            <span class="edit" onclick="editUser('${u}')">edit user</span>
            <span class="delete" onclick="deleteUser('${u}')">delete user</span>
          </div>
        </div>

        <table>
          <tr>
            <th>Project</th>
            <th>Link</th>
            <th>Action</th>
          </tr>

          ${rows}
        </table>

      </div>
    `;
  }
}

render();

/* LOGOUT */
function logout(){
  localStorage.clear();
  location.href="index.html";
}

</script>

</body>
</html>
