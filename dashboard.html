<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flat Admin Dashboard</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#0a0f1c;
  color:white;
}

/* TOP */
.topbar{
  background:#111827;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* MAIN */
.main{
  padding:20px;
}

/* INPUTS */
input,button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
}

input{
  background:#111827;
  color:white;
}

button{
  background:#38bdf8;
  color:white;
  cursor:pointer;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  background:#111827;
  border-radius:10px;
  overflow:hidden;
}

th,td{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  text-align:left;
}

th{
  color:#38bdf8;
}

.delete{ color:red; cursor:pointer; }
.edit{ color:orange; cursor:pointer; margin-left:10px; }

.openBtn{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  background:#38bdf8;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">
  <h3>⚡ Flat Admin Dashboard</h3>
  <div>👤 Admin</div>
</div>

<div class="main">

  <!-- ADD -->
  <div>
    <input id="user" placeholder="Username">
    <input id="name" placeholder="Project name">
    <input id="link" placeholder="Project link">
    <button onclick="add()">Add</button>
  </div>

  <!-- TABLE -->
  <table>
    <thead>
      <tr>
        <th>User</th>
        <th>Project</th>
        <th>Link</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody id="list"></tbody>
  </table>

</div>

<script>

/* DATA */
function getData(){
  return JSON.parse(localStorage.getItem("projects")) || [];
}

function save(d){
  localStorage.setItem("projects", JSON.stringify(d));
}

/* ADD */
function add(){
  let d = getData();

  let user = document.getElementById("user").value;
  let name = document.getElementById("name").value;
  let link = document.getElementById("link").value;

  if(!user || !name || !link){
    alert("Fill all");
    return;
  }

  if(!link.startsWith("http")){
    link = "https://" + link;
  }

  d.push({
    id:Date.now(),
    user,
    name,
    link
  });

  save(d);
  render();
}

/* DELETE */
function del(id){
  let d = getData().filter(x=>x.id!==id);
  save(d);
  render();
}

/* EDIT */
function edit(id){
  let d = getData();
  let p = d.find(x=>x.id===id);

  let n = prompt("Edit project", p.name);
  if(n) p.name = n;

  let l = prompt("Edit link", p.link);
  if(l){
    if(!l.startsWith("http")) l="https://"+l;
    p.link = l;
  }

  save(d);
  render();
}

/* RENDER FLAT TABLE */
function render(){
  let d = getData();

  let html = d.map(p=>`
    <tr>
      <td>${p.user}</td>
      <td>${p.name}</td>

      <td>
        <a href="${p.link}" target="_blank">
          <button class="openBtn">OPEN</button>
        </a>
      </td>

      <td>
        <span class="delete" onclick="del(${p.id})">delete</span>
        <span class="edit" onclick="edit(${p.id})">edit</span>
      </td>
    </tr>
  `).join("");

  document.getElementById("list").innerHTML = html;
}

render();

</script>

</body>
</html>
