<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0f1c;
  color: white;
  display: flex;
}

.sidebar {
  width: 220px;
  background: #111827;
  height: 100vh;
  padding: 20px;
}

.sidebar a {
  display: block;
  color: #94a3b8;
  margin: 10px 0;
  cursor: pointer;
}

.main {
  flex: 1;
  padding: 20px;
}

input {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  background: #111827;
  color: white;
}

button {
  padding: 10px 14px;
  background: #38bdf8;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.card {
  background: #1e293b;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h3>👤 User Panel</h3>
  <p id="currentUser"></p>
  <a onclick="logout()">Logout</a>
</div>

<div class="main">

<h2>My Projects</h2>

<input id="name" placeholder="Project name">
<input id="link" placeholder="Project link">
<button onclick="addProject()">Add</button>

<div id="list"></div>

</div>

<script>

/* ---------------- LOGIN CHECK ---------------- */
let user = localStorage.getItem("user");

if(!user) {
  window.location.href = "index.html";
}

document.getElementById("currentUser").innerText = "👤 " + user;

/* ---------------- DATA PER USER ---------------- */
function getData() {
  return JSON.parse(localStorage.getItem("projects_" + user)) || [];
}

function saveData(data) {
  localStorage.setItem("projects_" + user, JSON.stringify(data));
}

/* ---------------- RENDER ---------------- */
function render() {
  let projects = getData();
  const list = document.getElementById("list");
  list.innerHTML = "";

  projects.forEach((p, i) => {
    list.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <a href="${p.link}" target="_blank">${p.link}</a><br><br>
        <button onclick="editProject(${i})">Edit</button>
        <button onclick="deleteProject(${i})">Delete</button>
      </div>
    `;
  });
}

/* ---------------- ADD ---------------- */
function addProject() {
  let projects = getData();

  const name = document.getElementById("name").value;
  const link = document.getElementById("link").value;

  if(!name || !link) return alert("Fill fields");

  projects.push({name, link});
  saveData(projects);

  render();
}

/* ---------------- DELETE ---------------- */
function deleteProject(i) {
  let projects = getData();
  projects.splice(i, 1);
  saveData(projects);
  render();
}

/* ---------------- EDIT ---------------- */
function editProject(i) {
  let projects = getData();

  const n = prompt("Name", projects[i].name);
  const l = prompt("Link", projects[i].link);

  if(n && l) {
    projects[i] = {name:n, link:l};
    saveData(projects);
    render();
  }
}

/* ---------------- LOGOUT ---------------- */
function logout() {
  localStorage.removeItem("user");
  window.location.href = "index.html";
}

render();

</script>

</body>
</html>
