<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Pro Admin Dashboard</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe UI',sans-serif;
  background:radial-gradient(circle at top,#0f172a,#020617);
  color:white;
  overflow-x:hidden;
}

.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:240px;
  height:100vh;
  background:rgba(15,23,42,0.7);
  backdrop-filter:blur(20px);
  border-right:1px solid rgba(255,255,255,0.08);
  padding:20px;
  z-index:100;
}

.logo{
  font-size:28px;
  font-weight:bold;
  color:#38bdf8;
  margin-bottom:30px;
}

.menu button{
  width:100%;
  margin-bottom:10px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#111827;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.menu button:hover{
  background:#38bdf8;
  transform:translateX(5px);
}

.topbar{
  position:fixed;
  left:240px;
  right:0;
  top:0;
  height:70px;
  background:rgba(15,23,42,0.6);
  backdrop-filter:blur(15px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  z-index:99;
}

.search{
  width:300px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#111827;
  color:white;
}

.profile{
  display:flex;
  align-items:center;
  gap:10px;
  position:relative;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#38bdf8;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.admin-btn{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#38bdf8,#0ea5e9);
  color:white;
  cursor:pointer;
}

#adminMenu{
  display:none;
  position:absolute;
  right:0;
  top:55px;
  width:180px;
  background:#111827;
  border-radius:12px;
  padding:10px;
  border:1px solid rgba(255,255,255,0.08);
}

#adminMenu button{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  color:white;
  background:#1e293b;
}

#adminMenu button:last-child{
  background:#ef4444;
}

.main{
  margin-left:240px;
  padding:90px 20px 20px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.stat{
  background:rgba(15,23,42,0.7);
  padding:20px;
  border-radius:18px;
  border:1px solid rgba(56,189,248,0.15);
}

.stat h2{
  margin-top:10px;
  color:#38bdf8;
}

.form-box{
  margin-top:20px;
  background:rgba(15,23,42,0.7);
  padding:20px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,0.08);
}

.form-box input{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#111827;
  color:white;
}

.add-btn{
  margin-top:15px;
  width:100%;
  padding:13px;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,#38bdf8,#0ea5e9);
  color:white;
  cursor:pointer;
  font-size:16px;
}

#list{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
  gap:15px;
}

.card{
  background:rgba(15,23,42,0.7);
  border-radius:18px;
  padding:20px;
  border:1px solid rgba(255,255,255,0.08);
}

.user-title{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:15px;
}

.user-avatar{
  width:45px;
  height:45px;
  border-radius:50%;
  background:#38bdf8;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.project{
  background:#0f172a;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
}

.project a{
  color:#38bdf8;
  text-decoration:none;
  word-break:break-all;
}

.actions{
  margin-top:10px;
  display:flex;
  gap:10px;
}

.delete{
  background:#ef4444;
  padding:8px 12px;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

.edit{
  background:#f59e0b;
  padding:8px 12px;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

.toast{
  position:fixed;
  right:20px;
  bottom:20px;
  background:#38bdf8;
  color:white;
  padding:15px 20px;
  border-radius:12px;
  display:none;
  z-index:999;
}

</style>
</head>

<body>

<div class="sidebar">

  <div class="logo">
    ⚡ Ultra Admin
  </div>

  <div class="menu">
    <button>📊 Dashboard</button>
    <button>👤 Users</button>
    <button>📁 Projects</button>
    <button>⚙️ Settings</button>
  </div>

</div>

<div class="topbar">

  <input
    type="text"
    id="search"
    class="search"
    placeholder="🔍 Search..."
    oninput="renderProjects()"
  >

  <div class="profile">

    <div class="avatar" id="avatar">A</div>

    <span id="username"></span>

    <button class="admin-btn" onclick="toggleMenu()">
      Admin
    </button>

    <div id="adminMenu">

      <button onclick="changePassword()">
        Change Password
      </button>

      <button onclick="logout()">
        Logout
      </button>

    </div>

  </div>

</div>

<div class="main">

  <div class="stats">

    <div class="stat">
      👤 Users
      <h2 id="usersCount">0</h2>
    </div>

    <div class="stat">
      📁 Projects
      <h2 id="projectsCount">0</h2>
    </div>

    <div class="stat">
      🌐 Online
      <h2 id="onlineCount">0</h2>
    </div>

  </div>

  <div class="form-box">

    <h2>➕ Add Project</h2>

    <input type="text" id="user" placeholder="Username">

    <input type="text" id="project" placeholder="Project Name">

    <input type="text" id="link" placeholder="Project Link">

    <button class="add-btn" onclick="addProject()">
      Add Project
    </button>

  </div>

  <div id="list"></div>

</div>

<div class="toast" id="toast"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
push,
set,
onValue,
remove,
update
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE */

const firebaseConfig = {

  apiKey: "AIzaSyDkx9FZ_TjNYzz9J6-rdtkKk72HCu1bSOY",

  authDomain: "ismail-f50ba.firebaseapp.com",

  databaseURL: "https://ismail-f50ba-default-rtdb.firebaseio.com",

  projectId: "ismail-f50ba",

  storageBucket: "ismail-f50ba.firebasestorage.app",

  messagingSenderId: "580219017127",

  appId: "1:580219017127:web:5128b2d18bec1c3b4a4882",

  measurementId: "G-F8K5JWTJS0"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

let projectsData = {};

/* AUTH */

if(localStorage.getItem("auth") !== "true"){
  location.href = "index.html";
}

/* USER */

let currentUser =
localStorage.getItem("user") || "Admin";

document.getElementById("username").innerText =
currentUser;

document.getElementById("avatar").innerText =
currentUser.charAt(0).toUpperCase();

/* TOAST */

function toast(msg){

  let t = document.getElementById("toast");

  t.innerText = msg;

  t.style.display = "block";

  setTimeout(()=>{
    t.style.display = "none";
  },3000);

}

/* MENU */

window.toggleMenu = function(){

  let m =
  document.getElementById("adminMenu");

  m.style.display =
  m.style.display === "block"
  ? "none"
  : "block";

}

/* PASSWORD */

window.changePassword = function(){

  let old = prompt("Current password:");

  if(old !== localStorage.getItem("admin_pass")){
    toast("Wrong password");
    return;
  }

  let np = prompt("New password:");

  if(np){

    localStorage.setItem("admin_pass",np);

    toast("Password updated");

  }

}

/* LOGOUT */

window.logout = function(){

  localStorage.removeItem("auth");

  localStorage.removeItem("user");

  location.href = "index.html";

}

/* ADD */

window.addProject = async function(){

  let user =
  document.getElementById("user").value.trim();

  let project =
  document.getElementById("project").value.trim();

  let link =
  document.getElementById("link").value.trim();

  if(!user || !project || !link){

    toast("Fill all fields");
    return;

  }

  if(!link.startsWith("http")){
    link = "https://" + link;
  }

  const newRef =
  push(ref(db,"projects"));

  await set(newRef,{

    user,
    project,
    link,
    status:"online"

  });

  document.getElementById("user").value = "";
  document.getElementById("project").value = "";
  document.getElementById("link").value = "";

  toast("Project added");

}

/* DELETE */

window.deleteProject = async function(id){

  await remove(ref(db,"projects/" + id));

  toast("Project deleted");

}

/* EDIT */

window.editProject = async function(
id,
project,
link
){

  let newName =
  prompt("Edit project",project);

  let newLink =
  prompt("Edit link",link);

  if(!newName || !newLink){
    return;
  }

  if(!newLink.startsWith("http")){
    newLink = "https://" + newLink;
  }

  await update(ref(db,"projects/" + id),{

    project:newName,
    link:newLink

  });

  toast("Project updated");

}

/* RENDER */

window.renderProjects = function(){

  let q =
  document.getElementById("search")
  .value
  .toLowerCase();

  let grouped = {};

  let users = new Set();

  let total = 0;

  let online = 0;

  Object.entries(projectsData).forEach(([id,p])=>{

    if(
      !p.user.toLowerCase().includes(q)
      &&
      !p.project.toLowerCase().includes(q)
    ){
      return;
    }

    users.add(p.user);

    total++;

    if(p.status === "online"){
      online++;
    }

    if(!grouped[p.user]){
      grouped[p.user] = [];
    }

    grouped[p.user].push({
      id,
      ...p
    });

  });

  document.getElementById("usersCount")
  .innerText = users.size;

  document.getElementById("projectsCount")
  .innerText = total;

  document.getElementById("onlineCount")
  .innerText = online;

  let box =
  document.getElementById("list");

  box.innerHTML = "";

  for(let user in grouped){

    let html = "";

    grouped[user].forEach(p=>{

      html += `

      <div class="project">

        <h3>${p.project}</h3>

        <a href="${p.link}" target="_blank">
          ${p.link}
        </a>

        <div class="actions">

          <button
          class="delete"
          onclick="deleteProject('${p.id}')">
          Delete
          </button>

          <button
          class="edit"
          onclick="editProject(
          '${p.id}',
          '${p.project}',
          '${p.link}'
          )">
          Edit
          </button>

        </div>

      </div>

      `;

    });

    box.innerHTML += `

    <div class="card">

      <div class="user-title">

        <div class="user-avatar">
          ${user.charAt(0).toUpperCase()}
        </div>

        <h2>${user}</h2>

      </div>

      ${html}

    </div>

    `;

  }

}

/* REALTIME */

const projectsRef = ref(db,"projects");

onValue(projectsRef,(snapshot)=>{

  projectsData = snapshot.val() || {};

  renderProjects();

});

</script>

</body>
</html>
