<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra Pro Dashboard - Dev Version</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#0a0f1c;
  color:white;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:240px;
  height:100vh;
  background:#111827;
  padding:20px;
}

.sidebar h2{ color:#38bdf8; }

/* TOPBAR */
.topbar{
  position:fixed;
  left:240px;
  right:0;
  top:0;
  height:60px;
  background:#111827;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
}

/* SEARCH */
#search{
  padding:8px;
  border-radius:8px;
  border:none;
  background:#1f2937;
  color:white;
  width:220px;
}

/* MAIN */
.main{
  margin-left:240px;
  margin-top:60px;
  padding:20px;
}

/* STATS */
.stats{
  display:flex;
  gap:15px;
}

.stat{
  flex:1;
  background:#111827;
  padding:15px;
  border-radius:12px;
  text-align:center;
  color:#38bdf8;
}

/* INPUTS */
input,button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
}

input{
  background:#1f2937;
  color:white;
}

button{
  background:#38bdf8;
  color:white;
  cursor:pointer;
}

/* TABLE */
table{
  width:100%;
  margin-top:15px;
  border-collapse:collapse;
  background:#111827;
  border-radius:10px;
  overflow:hidden;
}

th,td{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

th{
  color:#38bdf8;
  text-align:left;
}

/* BUTTONS */
.openBtn{
  padding:6px 10px;
  border-radius:6px;
  border:none;
  background:#38bdf8;
  color:white;
  cursor:pointer;
}

.delete{ color:#ef4444; cursor:pointer; }
.edit{ color:#facc15; cursor:pointer; margin-left:10px; }

/* EMPTY */
.empty{
  text-align:center;
  margin-top:30px;
  opacity:0.6;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>⚡ Dev Dashboard</h2>
</div>

<!-- TOP -->
<div class="topbar">
  <input id="search" placeholder="Search..." oninput="render()">
  👤 <span id="user"></span>
</div>

<!-- MAIN -->
<div class="main">

  <!-- STATS -->
  <div class="stats">
    <div class="stat">👤 Users<br><span id="usersCount">0</span></div>
    <div class="stat">📁 Projects<br><span id="projectsCount">0</span></div>
  </div>

  <!-- ADD -->
  <div>
    <input id="u" placeholder="User">
    <input id="n" placeholder="Project">
    <input id="l" placeholder="Link">
    <button onclick="add()">Add</button>
  </div>

  <!-- TABLE -->
  <table>
    <thead>
      <tr>
        <th>User</th>
        <th>Project</th>
        <th>Link</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="list"></tbody>
  </table>

  <div id="empty" class="empty" style="display:none;">
    No data found 📭
  </div>

</div>

<script>

if(localStorage.getItem("auth") !== "true"){
  location.href="index.html";
}

document.getElementById("user").innerText =
  localStorage.getItem("user");

function getData(){
  return JSON.parse(localStorage.getItem("projects")) || [];
}

function save(d){
  localStorage.setItem("projects", JSON.stringify(d));
}

/* ADD */
function add(){
  let d = getData();

  let u = document.getElementById("u").value;
  let n = document.getElementById("n").value;
  let l = document.getElementById("l").value;

  if(!u || !n || !l){
    alert("Fill all");
    return;
  }

  if(!l.startsWith("http")) l = "https://" + l;

  d.push({id:Date.now(), user:u, name:n, link:l});
  save(d);

  render();
}

/* DELETE */
function del(id){
  let d = getData().filter(x=>x.id!==id);
  save(d);
  render();
}

/* EDIT */
function edit(id){
  let d = getData();
  let p = d.find(x=>x.id===id);

  let n = prompt("Edit project", p.name);
  if(n) p.name = n;

  let l = prompt("Edit link", p.link);
  if(l){
    if(!l.startsWith("http")) l="https://"+l;
    p.link = l;
  }

  save(d);
  render();
}

/* RENDER FLAT */
function render(){
  let d = getData();

  let q = document.getElementById("search").value?.toLowerCase() || "";

  let f = d.filter(p =>
    p.user.toLowerCase().includes(q) ||
    p.name.toLowerCase().includes(q)
  );

  document.getElementById("usersCount").innerText =
    new Set(f.map(x=>x.user)).size;

  document.getElementById("projectsCount").innerText =
    f.length;

  let box = document.getElementById("list");
  let empty = document.getElementById("empty");

  box.innerHTML = "";

  if(f.length === 0){
    empty.style.display = "block";
    return;
  }else{
    empty.style.display = "none";
  }

  f.forEach(p=>{
    box.innerHTML += `
      <tr>
        <td>${p.user}</td>
        <td>${p.name}</td>

        <td>
          <a href="${p.link}" target="_blank">
            <button class="openBtn">OPEN</button>
          </a>
        </td>

        <td>
          <span class="delete" onclick="del(${p.id})">del</span>
          <span class="edit" onclick="edit(${p.id})">edit</span>
        </td>
      </tr>
    `;
  });
}

render();

</script>

</body>
</html>
