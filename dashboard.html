<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra Admin Pro</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: radial-gradient(circle at top,#0b1220,#050814);
  color:white;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  width:240px;
  height:100vh;
  background:rgba(17,24,39,0.7);
  backdrop-filter: blur(20px);
  padding:20px;
  border-right:1px solid rgba(255,255,255,0.08);
}

.sidebar h2{color:#38bdf8;}

.btn{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background:rgba(56,189,248,0.15);
  color:white;
  transition:0.3s;
}

.btn:hover{
  background:#38bdf8;
  transform:translateX(5px);
}

/* TOPBAR */
.topbar{
  position:fixed;
  left:240px;
  right:0;
  top:0;
  height:60px;
  background:rgba(15,23,42,0.8);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
}

/* MAIN */
.main{
  margin-left:240px;
  margin-top:60px;
  padding:20px;
}

/* CARD */
.card{
  background:rgba(17,24,39,0.8);
  backdrop-filter:blur(20px);
  padding:15px;
  margin:10px 0;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.08);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-3px);
  border-color:#38bdf8;
}

/* INPUT */
input{
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
  background:#0f172a;
  color:white;
  outline:none;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:linear-gradient(135deg,#38bdf8,#0ea5e9);
  color:white;
}

/* LINK */
a{
  color:#38bdf8;
  word-break:break-all;
}

/* HIDE */
.hidden{display:none;}

.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  background:rgba(56,189,248,0.2);
  font-size:12px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>⚡ Admin</h2>

  <button class="btn" onclick="App.show('projects')">📁 Projects</button>
  <button class="btn" onclick="App.show('users')">👤 Users</button>
  <button class="btn" onclick="App.logout()">🚪 Logout</button>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <span>Ultra Admin Panel</span>
  👤 <span id="username"></span>
</div>

<!-- MAIN -->
<div class="main">

<!-- PROJECTS -->
<div id="projectsView">

  <div class="card">
    <h3>➕ Add Project</h3>
    <input id="pUser" placeholder="Username">
    <input id="pName" placeholder="Project name">
    <input id="pLink" placeholder="Project link">
    <button onclick="Projects.add()">Add</button>
  </div>

  <div id="projectsList"></div>
</div>

<!-- USERS -->
<div id="usersView" class="hidden">
  <div class="card">
    <h3>👤 Users Management</h3>
    <div id="usersList"></div>
  </div>
</div>

</div>

<script>

/* AUTH */
if(localStorage.getItem("auth")!=="true"){
  location.href="index.html";
}

document.getElementById("username").innerText =
  localStorage.getItem("user");

/* STORAGE */
const Storage={
  get:k=>JSON.parse(localStorage.getItem(k))||[],
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))
};

if(!localStorage.getItem("projects")) Storage.set("projects",[]);
if(!localStorage.getItem("users")) Storage.set("users",[
  {username:"user1",password:"1234"},
  {username:"user2",password:"1234"}
]);

/* APP */
const App={
  show(v){
    document.getElementById("projectsView").classList.add("hidden");
    document.getElementById("usersView").classList.add("hidden");

    document.getElementById(v+"View").classList.remove("hidden");

    if(v==="projects") Projects.render();
    if(v==="users") Users.render();
  },

  logout(){
    localStorage.clear();
    location.href="index.html";
  }
};

/* PROJECTS */
const Projects={
  add(){
    let d=Storage.get("projects");

    let u=document.getElementById("pUser").value;
    let n=document.getElementById("pName").value;
    let l=document.getElementById("pLink").value;

    if(!l.startsWith("http")) l="https://"+l;

    d.push({id:Date.now(),user:u,name:n,link:l});
    Storage.set("projects",d);
    this.render();
  },

  delete(id){
    Storage.set("projects",Storage.get("projects").filter(x=>x.id!==id));
    this.render();
  },

  render(){
    let box=document.getElementById("projectsList");
    let d=Storage.get("projects");
    box.innerHTML="";

    d.forEach(p=>{
      box.innerHTML+=`
        <div class="card">
          <span class="badge">${p.user}</span>
          <h3>${p.name}</h3>
          <a href="${p.link}" target="_blank">${p.link}</a><br><br>
          <button onclick="Projects.delete(${p.id})">Delete</button>
        </div>
      `;
    });
  }
};

/* USERS */
const Users={
  delete(u){
    Storage.set("users",Storage.get("users").filter(x=>x.username!==u));
    this.render();
  },

  edit(u){
    let d=Storage.get("users");
    let user=d.find(x=>x.username===u);

    let np=prompt("New password",user.password);
    if(np) user.password=np;

    Storage.set("users",d);
    this.render();
  },

  render(){
    let box=document.getElementById("usersList");
    let d=Storage.get("users");
    box.innerHTML="";

    d.forEach(u=>{
      box.innerHTML+=`
        <div class="card">
          <span class="badge">USER</span>
          <h3>${u.username}</h3>
          <p>${u.password}</p>

          <button onclick="Users.edit('${u.username}')">Edit</button>
          <button onclick="Users.delete('${u.username}')">Delete</button>
        </div>
      `;
    });
  }
};

Projects.render();

</script>

</body>
</html>
