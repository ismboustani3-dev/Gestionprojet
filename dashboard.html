<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra Admin Panel</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: radial-gradient(circle at top,#0a0f1c,#050814);
  color:white;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:240px;
  height:100vh;
  background:#111827;
  padding:20px;
  border-right:1px solid rgba(255,255,255,0.1);
}

.sidebar h2{color:#38bdf8;}

.menuBtn{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#0ea5e9;
  color:white;
}

/* TOPBAR */
.topbar{
  position:fixed;
  top:0;
  left:240px;
  right:0;
  height:60px;
  background:#0f172a;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
}

/* MAIN */
.main{
  margin-left:240px;
  margin-top:60px;
  padding:20px;
}

/* CARD */
.card{
  background:#111827;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

/* HIDE/SHOW */
.hidden{display:none;}

input,button{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  background:#38bdf8;
  color:white;
  cursor:pointer;
}

.danger{background:#ef4444;}

.link{color:#38bdf8;}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:8px;
  border-bottom:1px solid #333;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>⚡ Ultra Admin</h2>

  <button class="menuBtn" onclick="showView('projects')">📁 Projects</button>
  <button class="menuBtn" onclick="showView('users')">👤 Users</button>
  <button class="menuBtn" onclick="logout()">🚪 Logout</button>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <span>Dashboard</span>
  👤 <span id="username"></span>
</div>

<!-- MAIN -->
<div class="main">

<!-- PROJECTS VIEW -->
<div id="projectsView">

  <div class="card">
    <h3>➕ Add Project</h3>
    <input id="user" placeholder="Username">
    <input id="name" placeholder="Project name">
    <input id="link" placeholder="Project link">
    <button onclick="add()">Add</button>
  </div>

  <div id="projectList"></div>
</div>

<!-- USERS VIEW -->
<div id="usersView" class="hidden">
  <h3>👤 Users Management</h3>
  <div id="usersList"></div>
</div>

</div>

<script>

/* AUTH */
if(localStorage.getItem("auth")!=="true"){
  location.href="index.html";
}

document.getElementById("username").innerText =
  localStorage.getItem("user");

/* DATA */
function getData(){
  return JSON.parse(localStorage.getItem("projects")) || [];
}
function save(d){
  localStorage.setItem("projects",JSON.stringify(d));
}

function getUsers(){
  return JSON.parse(localStorage.getItem("users")) || [];
}
function saveUsers(d){
  localStorage.setItem("users",JSON.stringify(d));
}

/* SWITCH VIEWS */
function showView(v){
  document.getElementById("projectsView").classList.add("hidden");
  document.getElementById("usersView").classList.add("hidden");

  if(v==="projects"){
    document.getElementById("projectsView").classList.remove("hidden");
  }

  if(v==="users"){
    document.getElementById("usersView").classList.remove("hidden");
    renderUsers();
  }
}

/* PROJECTS */
function add(){
  let d=getData();

  let user=document.getElementById("user").value;
  let name=document.getElementById("name").value;
  let link=document.getElementById("link").value;

  if(!link.startsWith("http")) link="https://"+link;

  d.push({id:Date.now(),user,name,link});
  save(d);
  renderProjects();
}

function delProject(id){
  let d=getData().filter(x=>x.id!==id);
  save(d);
  renderProjects();
}

function renderProjects(){
  let d=getData();
  let box=document.getElementById("projectList");
  box.innerHTML="";

  d.forEach(p=>{
    box.innerHTML+=`
      <div class="card">
        <b>${p.user}</b><br>
        ${p.name}<br>
        <a class="link" href="${p.link}" target="_blank">${p.link}</a><br>
        <button onclick="delProject(${p.id})">Delete</button>
      </div>
    `;
  });
}

/* USERS */
function deleteUser(u){
  let d=getUsers().filter(x=>x.username!==u);
  saveUsers(d);
  renderUsers();
}

function editUser(u){
  let d=getUsers();
  let user=d.find(x=>x.username===u);

  let np=prompt("New password",user.password);
  if(np) user.password=np;

  saveUsers(d);
  renderUsers();
}

function renderUsers(){
  let d=getUsers();
  let box=document.getElementById("usersList");
  box.innerHTML="";

  d.forEach(u=>{
    box.innerHTML+=`
      <div class="card">
        <b>${u.username}</b><br>
        ${u.password}<br>
        <button onclick="editUser('${u.username}')">Edit</button>
        <button class="danger" onclick="deleteUser('${u.username}')">Delete</button>
      </div>
    `;
  });
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("auth");
  location.href="index.html";
}

/* INIT */
renderProjects();

</script>

</body>
</html>
