<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra Pro Admin Dashboard</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: radial-gradient(circle at top,#0a0f1c,#050814);
  color:white;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:240px;
  height:100vh;
  background: rgba(17,24,39,0.65);
  backdrop-filter: blur(15px);
  padding:20px;
  border-right:1px solid rgba(255,255,255,0.08);
}

.sidebar h2{ color:#38bdf8; }

/* TOPBAR */
.topbar{
  position:fixed;
  top:0;
  left:240px;
  right:0;
  height:60px;
  background: rgba(17,24,39,0.5);
  backdrop-filter: blur(15px);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
}

/* ADMIN MENU */
#adminMenu{
  display:none;
  position:absolute;
  right:0;
  top:40px;
  background:#111827;
  padding:10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);
  width:160px;
}

#adminMenu button{
  width:100%;
  margin:5px 0;
  padding:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  color:white;
  background:linear-gradient(45deg,#38bdf8,#0ea5e9);
}

#adminMenu button:last-child{
  background:#ef4444;
}

/* MAIN */
.main{
  margin-left:240px;
  margin-top:60px;
  padding:20px;
}

/* CARDS */
.card{
  background:#111827;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th{
  text-align:left;
  color:#38bdf8;
  padding:8px;
}

td{
  padding:8px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* INPUT */
input,button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
}

input{
  background:#111827;
  color:white;
}

button{
  background:linear-gradient(45deg,#38bdf8,#0ea5e9);
  color:white;
  cursor:pointer;
}

.danger{ background:#ef4444; }

.link{
  color:#38bdf8;
  text-decoration:underline;
  word-break:break-all;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>⚡ Ultra Admin</h2>
</div>

<!-- TOPBAR -->
<div class="topbar">

  <input id="search" placeholder="🔍 Search..." oninput="render()">

  <div style="position:relative;">
    👤 <span id="username"></span>

    <button onclick="toggleMenu()">⚙️ Admin</button>

    <div id="adminMenu">
      <button onclick="openSettings()">Settings</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

</div>

<!-- MAIN -->
<div class="main">

  <!-- PROJECTS -->
  <div class="card">
    <h3>➕ Add Project</h3>
    <input id="user" placeholder="Username">
    <input id="name" placeholder="Project name">
    <input id="link" placeholder="Project link">
    <button onclick="add()">Add</button>
  </div>

  <div id="list"></div>

  <!-- USERS ADMIN -->
  <div class="card">
    <h3>👑 Users Management</h3>
    <div id="usersBox"></div>
  </div>

</div>

<script>

/* INIT */
if(!localStorage.getItem("admin_pass")){
  localStorage.setItem("admin_pass","1234");
}

if(localStorage.getItem("auth") !== "true"){
  location.href="index.html";
}

document.getElementById("username").innerText =
  localStorage.getItem("user");

/* MENU */
function toggleMenu(){
  let m = document.getElementById("adminMenu");
  m.style.display = (m.style.display==="block")?"none":"block";
}

/* SETTINGS */
function openSettings(){
  let old = prompt("Enter current password:");
  if(old !== localStorage.getItem("admin_pass")){
    alert("Wrong password!");
    return;
  }

  let np = prompt("New password:");
  if(np){
    localStorage.setItem("admin_pass", np);
    alert("Password updated!");
  }

  document.getElementById("adminMenu").style.display="none";
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("auth");
  location.href="index.html";
}

/* PROJECTS DATA */
function getData(){
  return JSON.parse(localStorage.getItem("projects")) || [];
}

function save(d){
  localStorage.setItem("projects", JSON.stringify(d));
}

/* USERS DATA */
function getUsers(){
  return JSON.parse(localStorage.getItem("users")) || [];
}

function saveUsers(d){
  localStorage.setItem("users", JSON.stringify(d));
}

/* ADD PROJECT */
function add(){
  let d = getData();

  let user = document.getElementById("user").value;
  let name = document.getElementById("name").value;
  let link = document.getElementById("link").value;

  if(!user || !name || !link) return alert("Fill all");

  if(!link.startsWith("http")) link="https://"+link;

  d.push({id:Date.now(), user, name, link});
  save(d);
  render();
}

/* DELETE PROJECT */
function delProject(id){
  let d = getData().filter(x=>x.id!==id);
  save(d);
  render();
}

/* EDIT PROJECT */
function editProject(id){
  let d = getData();
  let p = d.find(x=>x.id===id);

  let n = prompt("Name", p.name);
  let l = prompt("Link", p.link);

  if(n) p.name=n;
  if(l){
    if(!l.startsWith("http")) l="https://"+l;
    p.link=l;
  }

  save(d);
  render();
}

/* DELETE USER */
function deleteUser(u){
  let d = getUsers().filter(x=>x.username!==u);
  saveUsers(d);
  renderUsers();
}

/* EDIT USER PASSWORD */
function editUser(u){
  let d = getUsers();
  let user = d.find(x=>x.username===u);

  let np = prompt("New password", user.password);
  if(np){
    user.password=np;
    saveUsers(d);
  }

  renderUsers();
}

/* RENDER PROJECTS */
function render(){
  let d = getData();
  let q = document.getElementById("search").value?.toLowerCase() || "";

  let filtered = d.filter(p =>
    p.user.toLowerCase().includes(q) ||
    p.name.toLowerCase().includes(q)
  );

  let box = document.getElementById("list");
  box.innerHTML = "";

  let grouped = {};

  filtered.forEach(p=>{
    if(!grouped[p.user]) grouped[p.user]=[];
    grouped[p.user].push(p);
  });

  for(let u in grouped){

    let rows = grouped[u].map(p=>`
      <tr>
        <td>${p.name}</td>
        <td><a class="link" href="${p.link}" target="_blank">${p.link}</a></td>
        <td>
          <span onclick="delProject(${p.id})">❌</span>
          <span onclick="editProject(${p.id})">✏️</span>
        </td>
      </tr>
    `).join("");

    box.innerHTML += `
      <div class="card">
        <h3>👤 ${u}</h3>
        <table>
          <tr><th>Project</th><th>Link</th><th>Action</th></tr>
          ${rows}
        </table>
      </div>
    `;
  }

  renderUsers();
}

/* RENDER USERS */
function renderUsers(){
  let d = getUsers();
  let box = document.getElementById("usersBox");

  if(!box) return;

  box.innerHTML="";

  d.forEach(u=>{
    box.innerHTML += `
      <div class="card">
        <h4>👤 ${u.username}</h4>
        <p>🔑 ${u.password}</p>

        <button onclick="editUser('${u.username}')">Edit Password</button>
        <button class="danger" onclick="deleteUser('${u.username}')">Delete User</button>
      </div>
    `;
  });
}

render();

</script>

</body>
</html>
