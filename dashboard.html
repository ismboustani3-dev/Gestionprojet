<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard Table</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:white;
  padding:20px;
}

input{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#111827;
  color:white;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  cursor:pointer;
}

/* TABLE */
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
  background:#111827;
  border-radius:10px;
  overflow:hidden;
}

th, td{
  padding:12px;
  border-bottom:1px solid #2d3748;
  text-align:left;
}

th{
  background:#1e293b;
  color:#38bdf8;
}

/* buttons */
.edit{
  background:#22c55e;
  color:white;
  border:none;
  padding:5px 8px;
  border-radius:6px;
  cursor:pointer;
}

.del{
  background:#ef4444;
  color:white;
  border:none;
  padding:5px 8px;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>📊 Projects Table</h2>

<!-- ADD -->
<input id="user" placeholder="Username">
<input id="name" placeholder="Project name">
<input id="link" placeholder="Project link">
<button onclick="add()">Add</button>

<!-- TABLE -->
<table>
  <thead>
    <tr>
      <th>Username</th>
      <th>Project Name</th>
      <th>Link</th>
      <th>Actions</th>
    </tr>
  </thead>

  <tbody id="tableBody"></tbody>
</table>

<script>

/* DATA */
function getData(){
  return JSON.parse(localStorage.getItem("projects")) || [];
}

function save(data){
  localStorage.setItem("projects", JSON.stringify(data));
}

/* ADD */
function add(){
  let data = getData();

  let user = document.getElementById("user").value;
  let name = document.getElementById("name").value;
  let link = document.getElementById("link").value;

  if(!user || !name || !link){
    return alert("Fill all fields");
  }

  // fix link
  if(!link.startsWith("http")){
    link = "https://" + link;
  }

  data.push({user, name, link});
  save(data);
  render();
}

/* DELETE */
function del(index){
  let data = getData();
  data.splice(index,1);
  save(data);
  render();
}

/* EDIT */
function edit(index){
  let data = getData();

  let u = prompt("Username", data[index].user);
  let n = prompt("Project name", data[index].name);
  let l = prompt("Link", data[index].link);

  if(u && n && l){

    if(!l.startsWith("http")){
      l = "https://" + l;
    }

    data[index] = {user:u, name:n, link:l};
    save(data);
    render();
  }
}

/* RENDER TABLE */
function render(){
  let data = getData();
  let table = document.getElementById("tableBody");

  table.innerHTML = "";

  data.forEach((p,i)=>{
    table.innerHTML += `
      <tr>
        <td>${p.user}</td>
        <td>${p.name}</td>
        <td><a href="${p.link}" target="_blank">${p.link}</a></td>
        <td>
          <button class="edit" onclick="edit(${i})">Edit</button>
          <button class="del" onclick="del(${i})">Delete</button>
        </td>
      </tr>
    `;
  });
}

render();

</script>

</body>
</html>
