<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Projects Dashboard</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial;
  background:#0b1220;
  color:white;
}

/* TOP */
.topbar{
  padding:15px;
  background:#111827;
  text-align:center;
}

/* CONTAINER */
.container{
  padding:20px;
}

/* INPUT AREA */
.form{
  margin-bottom:20px;
}

input{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#0f172a;
  color:white;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  cursor:pointer;
}

/* USERS GRID */
.users{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:15px;
}

/* USER CARD */
.card{
  background:#111827;
  padding:15px;
  border-radius:12px;
}

/* TITLE */
.card h3{
  margin-bottom:5px;
}

/* SMALL TEXT */
.small{
  font-size:12px;
  opacity:0.7;
  margin-bottom:10px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:8px;
  border-bottom:1px solid #2d3748;
  text-align:left;
}

th{
  color:#38bdf8;
}

a{
  color:#38bdf8;
}
</style>
</head>

<body>

<div class="topbar">
  <h2>📊 Projects by User</h2>
</div>

<div class="container">

  <!-- ADD FORM -->
  <div class="form">
    <input id="user" placeholder="Username">
    <input id="name" placeholder="Project name">
    <input id="link" placeholder="Project link">
    <button onclick="add()">Add</button>
  </div>

  <!-- USERS -->
  <div id="users" class="users"></div>

</div>

<script>

/* GET DATA */
function getData(){
  return JSON.parse(localStorage.getItem("projects")) || [];
}

/* SAVE DATA */
function save(data){
  localStorage.setItem("projects", JSON.stringify(data));
}

/* ADD PROJECT */
function add(){
  let data = getData();

  let user = document.getElementById("user").value;
  let name = document.getElementById("name").value;
  let link = document.getElementById("link").value;

  if(!user || !name || !link){
    return alert("Fill all fields");
  }

  if(!link.startsWith("http")){
    link = "https://" + link;
  }

  data.push({user,name,link});
  save(data);

  document.getElementById("user").value="";
  document.getElementById("name").value="";
  document.getElementById("link").value="";

  render();
}

/* RENDER USERS GROUPED */
function render(){

  let data = getData();
  let container = document.getElementById("users");

  container.innerHTML = "";

  // group by user
  let grouped = {};

  data.forEach(p=>{
    if(!grouped[p.user]){
      grouped[p.user] = [];
    }
    grouped[p.user].push(p);
  });

  // create cards
  for(let user in grouped){

    let projects = grouped[user];

    let rows = projects.map(p=>`
      <tr>
        <td>${p.name}</td>
        <td><a href="${p.link}" target="_blank">open</a></td>
      </tr>
    `).join("");

    container.innerHTML += `
      <div class="card">
        <h3>👤 ${user}</h3>
        <div class="small">${projects.length} projects</div>

        <table>
          <thead>
            <tr>
              <th>Project</th>
              <th>Link</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
          </tbody>
        </table>
      </div>
    `;
  }
}

render();

</script>

</body>
</html>
