<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra Pro Admin Dashboard</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: radial-gradient(circle at top,#0a0f1c,#050814);
  color:white;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:240px;
  height:100vh;
  background: rgba(17,24,39,0.65);
  backdrop-filter: blur(15px);
  padding:20px;
  border-right:1px solid rgba(255,255,255,0.08);
}

.sidebar h2{ color:#38bdf8; }

/* TOPBAR */
.topbar{
  position:fixed;
  top:0;
  left:240px;
  right:0;
  height:60px;
  background: rgba(17,24,39,0.5);
  backdrop-filter: blur(15px);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
}

/* SEARCH */
#search{
  padding:8px;
  border-radius:8px;
  border:none;
  background:#111827;
  color:white;
  width:200px;
}

/* MAIN */
.main{
  margin-left:240px;
  margin-top:60px;
  padding:20px;
}

/* STATS */
.stats{
  display:flex;
  gap:15px;
}

.stat{
  flex:1;
  background: rgba(17,24,39,0.6);
  padding:18px;
  border-radius:15px;
  text-align:center;
  border:1px solid rgba(56,189,248,0.2);
}

/* CARD */
.card{
  background: rgba(17,24,39,0.6);
  padding:15px;
  border-radius:15px;
  margin-top:15px;
}

/* INPUT */
input,button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
}

input{
  background:#111827;
  color:white;
}

button{
  background:linear-gradient(45deg,#38bdf8,#0ea5e9);
  color:white;
  cursor:pointer;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th{
  text-align:left;
  padding:8px;
  color:#38bdf8;
}

td{
  padding:8px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

/* BUTTON */
.openBtn{
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  color:white;
  cursor:pointer;
}

/* ACTION */
.delete{ color:#ef4444; cursor:pointer; }
.edit{ color:#facc15; cursor:pointer; margin-left:10px; }
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>⚡ Ultra Admin</h2>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <input id="search" placeholder="🔍 Search..." oninput="render()">
  👤 <span id="username"></span>
</div>

<!-- MAIN -->
<div class="main">

  <div class="stats">
    <div class="stat">👤 Users<br><span id="totalUsers">0</span></div>
    <div class="stat">📁 Projects<br><span id="totalProjects">0</span></div>
  </div>

  <div class="card">
    <h3>➕ Add Project</h3>
    <input id="user" placeholder="Username">
    <input id="name" placeholder="Project name">
    <input id="link" placeholder="Project link">
    <button onclick="add()">Add</button>
  </div>

  <div id="list"></div>

</div>

<script>

if(localStorage.getItem("auth") !== "true"){
  location.href="index.html";
}

document.getElementById("username").innerText =
  localStorage.getItem("user");

function getData(){
  return JSON.parse(localStorage.getItem("projects")) || [];
}

function save(d){
  localStorage.setItem("projects", JSON.stringify(d));
}

/* ADD */
function add(){
  let d = getData();

  let user = document.getElementById("user").value;
  let name = document.getElementById("name").value;
  let link = document.getElementById("link").value;

  if(!user || !name || !link){
    alert("Fill all");
    return;
  }

  if(!link.startsWith("http")){
    link = "https://" + link;
  }

  d.push({
    id: Date.now(),
    user,
    name,
    link
  });

  save(d);
  render();
}

/* DELETE */
function delProject(id){
  let d = getData().filter(x => x.id !== id);
  save(d);
  render();
}

/* EDIT */
function editProject(id){
  let d = getData();
  let p = d.find(x => x.id === id);

  let n = prompt("Edit name", p.name);
  if(n) p.name = n;

  let l = prompt("Edit link", p.link);
  if(l){
    if(!l.startsWith("http")) l="https://"+l;
    p.link = l;
  }

  save(d);
  render();
}

/* STATS */
function updateStats(d){
  let users = new Set(d.map(p => p.user));
  document.getElementById("totalUsers").innerText = users.size;
  document.getElementById("totalProjects").innerText = d.length;
}

/* RENDER + SEARCH */
function render(){
  let d = getData();

  let q = document.getElementById("search").value?.toLowerCase() || "";

  let filtered = d.filter(p =>
    p.user.toLowerCase().includes(q) ||
    p.name.toLowerCase().includes(q)
  );

  updateStats(filtered);

  let box = document.getElementById("list");
  box.innerHTML = "";

  let grouped = {};

  filtered.forEach(p=>{
    if(!grouped[p.user]) grouped[p.user] = [];
    grouped[p.user].push(p);
  });

  for(let u in grouped){

    let rows = grouped[u].map(p => `
      <tr>
        <td>${p.name}</td>
        <td>
          <a href="${p.link}" target="_blank">
            <button class="openBtn">OPEN</button>
          </a>
        </td>
        <td>
          <span class="delete" onclick="delProject(${p.id})">del</span>
          <span class="edit" onclick="editProject(${p.id})">edit</span>
        </td>
      </tr>
    `).join("");

    box.innerHTML += `
      <div class="card">
        <h3>👤 ${u}</h3>

        <table>
          <tr>
            <th>Project</th>
            <th>Link</th>
            <th>Action</th>
          </tr>
          ${rows}
        </table>
      </div>
    `;
  }
}

render();

</script>

</body>
</html>
