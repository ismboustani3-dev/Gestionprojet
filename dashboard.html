<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:white;
  display:flex;
}

/* Sidebar */
.sidebar{
  width:220px;
  background:#111827;
  height:100vh;
  padding:20px;
}

.sidebar h3{
  margin-bottom:15px;
}

.sidebar select{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
}

/* Main */
.main{
  flex:1;
  padding:20px;
}

/* Stats */
.stats{
  display:flex;
  gap:15px;
  margin-bottom:20px;
}

.stat{
  flex:1;
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  text-align:center;
}

.stat h2{
  margin:0;
}

/* Card */
.card{
  background:#1e293b;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
}

a{
  color:#38bdf8;
}

/* Buttons */
.btn{
  margin-top:10px;
  padding:5px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.del{
  background:#ef4444;
  color:white;
}
</style>
</head>

<body>

<script>
let currentUser = localStorage.getItem("user");
if(!currentUser){
  window.location.href="index.html";
}
</script>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>👤 Users</h3>
  <select id="filter" onchange="render()">
    <option value="all">All Users</option>
  </select>
</div>

<!-- MAIN -->
<div class="main">

<h2>📊 Dashboard</h2>

<!-- STATS -->
<div class="stats">
  <div class="stat">
    <h2 id="totalProjects">0</h2>
    <p>Projects</p>
  </div>

  <div class="stat">
    <h2 id="totalUsers">0</h2>
    <p>Users</p>
  </div>
</div>

<!-- LIST -->
<div id="list"></div>

</div>

<script>

/* DATA */
function getData(){
  return JSON.parse(localStorage.getItem("projects")) || [];
}

function save(data){
  localStorage.setItem("projects", JSON.stringify(data));
}

/* USERS LIST */
function getUsers(data){
  return [...new Set(data.map(p => p.user))];
}

/* RENDER */
function render(){
  let data = getData();
  let filter = document.getElementById("filter").value;

  let list = document.getElementById("list");
  list.innerHTML = "";

  let filtered = filter === "all"
    ? data
    : data.filter(p => p.user === filter);

  filtered.forEach((p,i)=>{
    list.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>👤 ${p.user}</p>
        <a href="${p.link}" target="_blank">${p.link}</a>
      </div>
    `;
  });

  /* STATS */
  document.getElementById("totalProjects").innerText = data.length;
  document.getElementById("totalUsers").innerText = getUsers(data).length;

  /* FILTER USERS */
  let users = getUsers(data);
  let select = document.getElementById("filter");

  select.innerHTML = `<option value="all">All Users</option>`;

  users.forEach(u=>{
    select.innerHTML += `<option value="${u}">${u}</option>`;
  });
}

render();

</script>

</body>
</html>
