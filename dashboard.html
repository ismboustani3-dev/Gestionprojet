<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grouped Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:white;
  padding:20px;
}

input{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#111827;
  color:white;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  cursor:pointer;
}

/* USER BOX */
.userBox{
  background:#111827;
  margin-top:20px;
  padding:15px;
  border-radius:12px;
}

/* TABLE */
table{
  width:100%;
  margin-top:10px;
  border-collapse:collapse;
}

th, td{
  padding:10px;
  border-bottom:1px solid #2d3748;
}

th{
  text-align:left;
  color:#38bdf8;
}

/* buttons */
.del{
  background:#ef4444;
  color:white;
  padding:5px 8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.edit{
  background:#22c55e;
  color:white;
  padding:5px 8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>📊 Projects Table (Grouped by User)</h2>

<!-- ADD -->
<input id="user" placeholder="Username">
<input id="name" placeholder="Project name">
<input id="link" placeholder="Project link">
<button onclick="add()">Add</button>

<!-- RESULT -->
<div id="container"></div>

<script>

/* DATA */
function getData(){
  return JSON.parse(localStorage.getItem("projects")) || [];
}

function save(data){
  localStorage.setItem("projects", JSON.stringify(data));
}

/* ADD */
function add(){
  let data = getData();

  let user = document.getElementById("user").value;
  let name = document.getElementById("name").value;
  let link = document.getElementById("link").value;

  if(!user || !name || !link){
    return alert("Fill all fields");
  }

  if(!link.startsWith("http")){
    link = "https://" + link;
  }

  data.push({user, name, link});
  save(data);
  render();
}

/* DELETE */
function del(index, userName){
  let data = getData();

  let filtered = data.filter(p => p.user === userName);
  let item = filtered[index];

  let realIndex = data.findIndex(p =>
    p.user === item.user &&
    p.name === item.name &&
    p.link === item.link
  );

  data.splice(realIndex,1);
  save(data);
  render();
}

/* EDIT */
function edit(index, userName){
  let data = getData();

  let filtered = data.filter(p => p.user === userName);
  let item = filtered[index];

  let realIndex = data.findIndex(p =>
    p.user === item.user &&
    p.name === item.name &&
    p.link === item.link
  );

  let u = prompt("Username", data[realIndex].user);
  let n = prompt("Project name", data[realIndex].name);
  let l = prompt("Link", data[realIndex].link);

  if(u && n && l){

    if(!l.startsWith("http")){
      l = "https://" + l;
    }

    data[realIndex] = {user:u, name:n, link:l};
    save(data);
    render();
  }
}

/* RENDER GROUPED TABLE */
function render(){
  let data = getData();
  let container = document.getElementById("container");

  container.innerHTML = "";

  let users = [...new Set(data.map(p => p.user))];

  users.forEach(user => {

    let userProjects = data.filter(p => p.user === user);

    let html = `
      <div class="userBox">
        <h3>👤 ${user}</h3>

        <table>
          <tr>
            <th>Project name</th>
            <th>Link</th>
            <th>Actions</th>
          </tr>
    `;

    userProjects.forEach((p,i)=>{
      html += `
        <tr>
          <td>${p.name}</td>
          <td><a href="${p.link}" target="_blank">${p.link}</a></td>
          <td>
            <button class="edit" onclick="edit(${i}, '${user}')">Edit</button>
            <button class="del" onclick="del(${i}, '${user}')">Delete</button>
          </td>
        </tr>
      `;
    });

    html += `</table></div>`;

    container.innerHTML += html;
  });
}

render();

</script>

</body>
</html>
