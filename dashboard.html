<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:white;
  display:flex;
}

.sidebar{
  width:220px;
  background:#111827;
  height:100vh;
  padding:20px;
}

.main{
  flex:1;
  padding:20px;
}

input, select{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#111827;
  color:white;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  cursor:pointer;
}

.card{
  background:#1e293b;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
}

.btn{
  margin-top:10px;
  padding:5px 10px;
  font-size:12px;
}

.del{
  background:#ef4444;
  color:white;
}
</style>
</head>

<body>

<script>
let currentUser = localStorage.getItem("user");
if(!currentUser){
  window.location.href="index.html";
}
</script>

<div class="sidebar">
  <h3>👤 <span id="u"></span></h3>

  <p>Filter by user:</p>
  <select id="filter" onchange="render()">
    <option value="all">All</option>
  </select>

  <br><br>
  <button onclick="logout()">Logout</button>
</div>

<div class="main">

<h2>📂 Projects Dashboard</h2>

<input id="name" placeholder="Project name">
<input id="link" placeholder="Project link">
<input id="user" placeholder="Project owner (user)">
<button onclick="add()">Add</button>

<div id="list"></div>

</div>

<script>

document.getElementById("u").innerText = currentUser;

/* DATA */
function getData(){
  return JSON.parse(localStorage.getItem("projects")) || [];
}

function save(data){
  localStorage.setItem("projects", JSON.stringify(data));
}

/* INIT USERS LIST */
function updateUsers(){
  let data = getData();
  let users = [...new Set(data.map(p=>p.user))];

  let filter = document.getElementById("filter");
  filter.innerHTML = `<option value="all">All</option>`;

  users.forEach(u=>{
    filter.innerHTML += `<option value="${u}">${u}</option>`;
  });
}

/* RENDER */
function render(){
  let data = getData();
  let filter = document.getElementById("filter").value;

  let list = document.getElementById("list");
  list.innerHTML = "";

  let filtered = filter==="all"
    ? data
    : data.filter(p=>p.user===filter);

  filtered.forEach((p,i)=>{
    list.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>👤 ${p.user}</p>
        <a href="${p.link}" target="_blank">${p.link}</a><br>

        <button class="btn" onclick="edit(${i})">Edit</button>
        <button class="btn del" onclick="del(${i})">Delete</button>
      </div>
    `;
  });

  updateUsers();
}

/* ADD */
function add(){
  let data = getData();

  let name = document.getElementById("name").value;
  let link = document.getElementById("link").value;
  let user = document.getElementById("user").value;

  if(!name || !link || !user){
    return alert("Fill all fields");
  }

  data.push({name, link, user});
  save(data);
  render();
}

/* DELETE */
function del(i){
  let data = getData();
  data.splice(i,1);
  save(data);
  render();
}

/* EDIT */
function edit(i){
  let data = getData();

  let n = prompt("Name", data[i].name);
  let l = prompt("Link", data[i].link);
  let u = prompt("User", data[i].user);

  if(n && l && u){
    data[i] = {name:n, link:l, user:u};
    save(data);
    render();
  }
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("user");
  window.location.href="index.html";
}

render();

</script>

</body>
</html>
