<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra Pro Admin Dashboard</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: radial-gradient(circle at top,#0a0f1c,#050814);
  color:white;
}

.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:240px;
  height:100vh;
  background: rgba(17,24,39,0.65);
  backdrop-filter: blur(15px);
  padding:20px;
  border-right:1px solid rgba(255,255,255,0.08);
}

.sidebar h2{color:#38bdf8;}

.topbar{
  position:fixed;
  top:0;
  left:240px;
  right:0;
  height:60px;
  background: rgba(17,24,39,0.5);
  backdrop-filter: blur(15px);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

#adminMenu{
  display:none;
  position:absolute;
  right:0;
  top:40px;
  background:#111827;
  padding:10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);
  width:160px;
}

#adminMenu button{
  width:100%;
  margin:5px 0;
  padding:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  color:white;
  background:linear-gradient(45deg,#38bdf8,#0ea5e9);
}

#adminMenu button:last-child{background:#ef4444;}

#search{
  padding:8px;
  border-radius:8px;
  border:none;
  background:#111827;
  color:white;
  width:200px;
}

.main{
  margin-left:240px;
  margin-top:60px;
  padding:20px;
}

.stats{display:flex;gap:15px;}
.stat{
  flex:1;
  background: rgba(17,24,39,0.6);
  padding:18px;
  border-radius:15px;
  text-align:center;
  border:1px solid rgba(56,189,248,0.2);
}

#list{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
  gap:15px;
  margin-top:15px;
}

.card{
  background: rgba(17,24,39,0.6);
  padding:15px;
  border-radius:15px;
  border:1px solid rgba(255,255,255,0.08);
}

table{width:100%;margin-top:10px;border-collapse:collapse;}
th{text-align:left;padding:8px;color:#38bdf8;}
td{padding:8px;border-bottom:1px solid rgba(255,255,255,0.08);}

input,button{padding:10px;margin:5px;border:none;border-radius:10px;}
input{background:#111827;color:white;}
button{background:linear-gradient(45deg,#38bdf8,#0ea5e9);color:white;cursor:pointer;}

.delete{color:#ef4444;cursor:pointer;}
.edit{color:#facc15;cursor:pointer;margin-left:10px;}

</style>
</head>

<body>

<div class="sidebar">
  <h2>⚡ Ultra Admin</h2>
  <button onclick="deleteUser()">🗑 Delete User</button>
</div>

<div class="topbar">
  <input id="search" placeholder="🔍 Search user/project..." oninput="render()">

  <div style="position:relative;">
    👤 <span id="username"></span>
    <button onclick="toggleMenu()">⚙️ Admin</button>

    <div id="adminMenu">
      <button onclick="openSettings()">Settings</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>
</div>

<div class="main">

  <div class="stats">
    <div class="stat">👤 Users<br><span id="totalUsers">0</span></div>
    <div class="stat">📁 Projects<br><span id="totalProjects">0</span></div>
  </div>

  <div class="card">
    <h3>➕ Add Project</h3>
    <input id="user" placeholder="Username">
    <input id="name" placeholder="Project name">
    <input id="link" placeholder="Project link">
    <button onclick="add()">Add</button>
  </div>

  <div id="list"></div>

</div>

<script>

if(!localStorage.getItem("admin_pass")) localStorage.setItem("admin_pass","1234");
if(localStorage.getItem("auth") !== "true") location.href="index.html";

document.getElementById("username").innerText = localStorage.getItem("user");

function toggleMenu(){
  let m=document.getElementById("adminMenu");
  m.style.display = m.style.display==="block"?"none":"block";
}

function openSettings(){
  let old=prompt("Enter password");
  if(old!==localStorage.getItem("admin_pass")) return alert("Wrong password");
  let n=prompt("New password");
  if(n) localStorage.setItem("admin_pass",n);
}

function logout(){
  localStorage.clear();
  location.href="index.html";
}

function getData(){return JSON.parse(localStorage.getItem("projects"))||[];}
function save(d){localStorage.setItem("projects",JSON.stringify(d));}

function add(){
  let d=getData();
  let user=user.value;
  let name=name.value;
  let link=link.value;

  if(!user||!name||!link) return;
  if(!link.startsWith("http")) link="https://"+link;

  d.push({id:Date.now(),user,name,link});
  save(d);
  render();
}

function delProject(id){
  save(getData().filter(x=>x.id!==id));
  render();
}

/* NEW: DELETE USER */
function deleteUser(){
  let u=prompt("Enter username to delete:");
  if(!u) return;

  let d=getData().filter(p=>p.user!==u);
  save(d);

  render();
}

function updateStats(d){
  let users=new Set(d.map(p=>p.user));
  document.getElementById("totalUsers").innerText=users.size;
  document.getElementById("totalProjects").innerText=d.length;
}

function render(){
  let d=getData();
  let q=document.getElementById("search").value?.toLowerCase()||"";

  let filtered=d.filter(p=>p.user.toLowerCase().includes(q)||p.name.toLowerCase().includes(q));

  updateStats(filtered);

  let box=document.getElementById("list");
  box.innerHTML="";

  let groups={};
  filtered.forEach(p=>{
    if(!groups[p.user]) groups[p.user]=[];
    groups[p.user].push(p);
  });

  for(let u in groups){
    let rows=groups[u].map(p=>`
      <tr>
        <td>${p.name}</td>
        <td><a href='${p.link}' target='_blank'>open</a></td>
        <td><span class='delete' onclick='delProject(${p.id})'>del</span></td>
      </tr>
    `).join("");

    box.innerHTML+=`
      <div class='card'>
        <h3>👤 ${u}</h3>
        <table>${rows}</table>
      </div>
    `;
  }
}

render();

</script>

</body>
</html>
