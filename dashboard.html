<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard Pro</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#0a0f1c;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  background: rgba(17,24,39,0.8);
  backdrop-filter: blur(10px);
  padding:20px;
  border-right:1px solid rgba(255,255,255,0.05);
}

.sidebar h2{
  color:#38bdf8;
  margin-bottom:10px;
}

.sidebar p{
  opacity:0.6;
  font-size:13px;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background: rgba(17,24,39,0.6);
  border-radius:12px;
  backdrop-filter: blur(10px);
  margin-bottom:20px;
}

.logout{
  background:#ef4444;
  padding:10px 14px;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

/* INPUTS */
input,button{
  padding:12px;
  margin:5px;
  border:none;
  border-radius:10px;
  transition:0.3s;
}

input{
  background:#111827;
  color:white;
  outline:none;
}

input:focus{
  transform:scale(1.03);
  box-shadow:0 0 10px #38bdf8;
}

button{
  background:linear-gradient(45deg,#38bdf8,#0ea5e9);
  color:white;
  cursor:pointer;
}

button:hover{
  transform:scale(1.05);
}

/* GRID */
.users{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:15px;
  margin-top:20px;
}

/* CARD */
.card{
  background: rgba(17,24,39,0.6);
  backdrop-filter: blur(10px);
  padding:15px;
  border-radius:15px;
  border:1px solid rgba(56,189,248,0.15);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 25px rgba(56,189,248,0.2);
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:8px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

th{
  color:#38bdf8;
}

a{
  color:#38bdf8;
  text-decoration:none;
}

.delete{
  color:#ef4444;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>⚡ Dashboard</h2>
  <p>Projects Manager</p>
  <p>• Add Projects</p>
  <p>• Manage Users</p>
  <p>• Local Storage DB</p>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    <h3>📊 Welcome <span id="username"></span></h3>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <!-- FORM -->
  <div>
    <input id="user" placeholder="Username">
    <input id="name" placeholder="Project name">
    <input id="link" placeholder="Project link">
    <button onclick="add()">Add</button>
  </div>

  <!-- USERS -->
  <div id="users" class="users"></div>

</div>

<script>

/* 🔐 AUTH CHECK */
if(localStorage.getItem("auth") !== "true"){
  window.location.href = "index.html";
}

/* USER NAME */
document.getElementById("username").innerText =
localStorage.getItem("user") || "User";

/* DATA */
function getData(){
  return JSON.parse(localStorage.getItem("projects")) || [];
}

function save(data){
  localStorage.setItem("projects", JSON.stringify(data));
}

/* ADD */
function add(){
  let data = getData();

  let user = document.getElementById("user").value;
  let name = document.getElementById("name").value;
  let link = document.getElementById("link").value;

  if(!user || !name || !link){
    alert("Fill all fields");
    return;
  }

  if(!link.startsWith("http")){
    link = "https://" + link;
  }

  data.push({
    id: Date.now(),
    user,
    name,
    link
  });

  save(data);

  document.getElementById("user").value="";
  document.getElementById("name").value="";
  document.getElementById("link").value="";

  render();
}

/* DELETE */
function remove(id){
  let data = getData().filter(p => p.id !== id);
  save(data);
  render();
}

/* LOGOUT */
function logout(){
  localStorage.clear();
  window.location.href = "index.html";
}

/* RENDER FIX */
function render(){
  let data = getData();
  let container = document.getElementById("users");

  container.innerHTML = "";

  if(!data || data.length === 0){
    container.innerHTML = `
      <p style="opacity:0.6;text-align:center;width:100%">
        No projects yet 😴
      </p>
    `;
    return;
  }

  let grouped = {};

  data.forEach(p=>{
    if(!grouped[p.user]) grouped[p.user] = [];
    grouped[p.user].push(p);
  });

  for(let user in grouped){

    let projects = grouped[user];

    let rows = projects.map(p=>`
      <tr>
        <td>${p.name}</td>
        <td><a href="${p.link}" target="_blank">open</a></td>
        <td><span class="delete" onclick="remove(${p.id})">delete</span></td>
      </tr>
    `).join("");

    container.innerHTML += `
      <div class="card">
        <h3>👤 ${user}</h3>

        <table>
          <tr>
            <th>Project</th>
            <th>Link</th>
            <th>Action</th>
          </tr>
          ${rows}
        </table>
      </div>
    `;
  }
}

render();

</script>

</body>
</html>
